<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponuky profesií</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f5f3ef; --bg2:#fff; --bg3:#f0ede8;
      --border:#e4dfd8; --border2:#c8bfb5;
      --text:#2c2825; --text2:#6b6460; --text3:#9e9590;
      --green:#1e7a4a; --grn-bg:#f0faf5; --grn-bd:#b8e6cc;
      --blue:#1a5fa0; --blu-bg:#f0f6fd; --blu-bd:#b8d4f0;
      --orange:#c96a1a; --ora-bg:#fdf6f0; --ora-bd:#f5d9be;
      --red:#c0392b; --red-bg:#fdf2f1; --red-bd:#f5c6c2;
      --sans:'DM Sans',system-ui,sans-serif;
      --r:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}

    .module-nav{background:var(--text);display:flex;padding:0 12px;overflow-x:auto;scrollbar-width:none}
    .module-nav::-webkit-scrollbar{display:none}
    .mnav-a{color:rgba(245,243,239,.45);text-decoration:none;padding:9px 10px;font-size:12px;font-weight:500;white-space:nowrap;border-bottom:2px solid transparent}
    .mnav-a.cur,.mnav-a:hover{color:#f5f3ef}
    .mnav-a.cur{border-bottom-color:rgba(245,243,239,.55)}

    .page-hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px;position:sticky;top:0;z-index:50}
    .page-hdr h1{font-size:16px;font-weight:600;flex:1}

    .main{max-width:880px;margin:0 auto;padding:20px 16px}

    #loginWrap{max-width:380px;margin:60px auto;padding:0 16px}
    .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:28px}
    .login-card h2{font-size:18px;margin-bottom:6px}
    .login-card p{color:var(--text2);font-size:13px;margin-bottom:20px}

    .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
    .tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
    .tab.on{color:var(--blue);border-bottom-color:var(--blue)}

    .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .card+.card{margin-top:12px}

    .row-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
    .row-item:last-of-type{border-bottom:none}
    .row-item:hover{background:var(--bg3)}
    .row-expand{display:none;padding:16px;border-top:1px solid var(--border);background:var(--bg3)}
    .row-expand.on{display:block}

    .badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500}
    .b-sent{background:var(--blu-bg);color:var(--blue);border:1px solid var(--blu-bd)}
    .b-viewed{background:var(--ora-bg);color:var(--orange);border:1px solid var(--ora-bd)}
    .b-submitted{background:var(--grn-bg);color:var(--green);border:1px solid var(--grn-bd)}
    .b-selected{background:var(--green);color:#fff}
    .b-rejected{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
    .b-active{background:var(--grn-bg);color:var(--green);border:1px solid var(--grn-bd)}
    .b-closed{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

    .qtable{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
    .qtable th{text-align:left;padding:7px 8px;border-bottom:2px solid var(--border);color:var(--text2);font-weight:500;font-size:12px}
    .qtable td{padding:8px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
    .qtable tr:last-child td{border-bottom:none}
    .qtable tr.winner{background:var(--grn-bg)}
    .qtable tr.loser{opacity:.5}

    .frow{margin-bottom:14px}
    .frow label{display:block;font-size:12px;color:var(--text2);font-weight:500;margin-bottom:5px}
    .finput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:14px;color:var(--text);font-family:var(--sans);outline:none}
    .finput:focus{border-color:var(--blue);background:var(--bg2)}
    textarea.finput{resize:vertical;min-height:70px}
    .frow-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:480px){.frow-2{grid-template-columns:1fr}}

    .chk-grid{display:flex;flex-wrap:wrap;gap:8px}
    .chk-lbl{display:flex;align-items:center;gap:5px;font-size:13px;padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;cursor:pointer}
    .chk-lbl:has(input:checked){background:var(--blu-bg);border-color:var(--blu-bd);color:var(--blue)}

    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;border:none;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer}
    .btn-p{background:var(--text);color:#f5f3ef}
    .btn-p:hover{background:#1a1614}
    .btn-g{background:transparent;color:var(--text2);border:1px solid var(--border)}
    .btn-g:hover{background:var(--bg3)}
    .btn-grn{background:var(--green);color:#fff}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap}

    .overlay{position:fixed;inset:0;background:rgba(44,40,37,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:32px 12px;overflow-y:auto}
    .modal{background:var(--bg2);border-radius:var(--r);padding:22px;width:100%;max-width:540px}
    .modal h3{font-size:16px;margin-bottom:18px}

    .alert{padding:10px 13px;border-radius:7px;font-size:13px;margin-bottom:12px}
    .alert-ok{background:var(--grn-bg);color:var(--green);border:1px solid var(--grn-bd)}
    .alert-err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

    .link-code{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:11px;font-family:monospace;word-break:break-all;color:var(--text2)}
    .suggest-box{position:absolute;z-index:200;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:7px;box-shadow:0 4px 16px rgba(0,0,0,.1);margin-top:2px;max-height:220px;overflow-y:auto}
    .suggest-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px}
    .suggest-item:last-child{border-bottom:none}
    .suggest-item:hover{background:var(--bg3)}
    .prehled-proj-hdr{padding:10px 14px;font-size:13px;font-weight:600;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .prehled-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:10px}
    .prehled-row:last-child{border-bottom:none}
    .hidden{display:none!important}
    .mt10{margin-top:10px}
    .mt16{margin-top:16px}
    .empty{padding:24px 16px;color:var(--text2);font-size:13px;text-align:center}
    .toast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-size:14px;font-weight:500;z-index:9999;white-space:nowrap}
    .toast-ok{background:var(--grn-bg);color:var(--green);border:1px solid var(--grn-bd)}
    .toast-err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>

<nav class="module-nav">
  <a href="index.html" class="mnav-a">Projekty</a>
  <a href="ponuky.html" class="mnav-a cur">Ponuky profesií</a>
</nav>

<!-- LOGIN -->

<!-- ADMIN -->
<div id="adminWrap" class="hidden">
  <div class="page-hdr">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:5px;color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;padding:5px 8px;border:1px solid var(--border);border-radius:7px;background:var(--bg3);flex-shrink:0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M15 18l-6-6 6-6"/></svg>

  <div class="frow"><label>Link na podklady na nacenenie</label><input class="finput" type="url" id="mRFolder" placeholder="https://drive.google.com/..."></div>
  <div class="frow"><label>Link na podklady na vypracovanie</label><input class="finput" type="url" id="mRFolderWork" placeholder="https://drive.google.com/..."></div>

<script>
const SB_URL = 'https://cfjkomqxzqflotrqxfyl.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmamtvbXF4enFmbG90cnF4ZnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTM1NjksImV4cCI6MjA5MzUyOTU2OX0.GUnw0I0wDrkIwaJ15TnpF_8zghW_8yIM_MZlyLF1dH8';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const cfg = JSON.parse(localStorage.getItem('pmCfg3') || '{}');
let requests = [], specialists = [], invitations = [], quotes = [], contacts = [], caflouProjects = [];
let editReqId = null, editSpecId = null, inviteReqId = null;
let _loading = false;

// ── AUTH ──────────────────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('adminWrap').classList.remove('hidden');
    document.getElementById('navEmail').textContent = session.user.email;
    await loadAll();
  } else {
    document.getElementById('loginWrap').classList.remove('hidden');
    document.getElementById('adminWrap').classList.add('hidden');
  }
});

async function sendMagicLink() {
  const email = document.getElementById('loginEmail').value.trim();
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: 'https://jozefperichta-ctrl.github.io/prehladpm/ponuky.html' } });
  const el = document.getElementById('loginMsg');
  if (error) el.innerHTML = `<div class="alert alert-err">${error.message}</div>`;
  else el.innerHTML = `<div class="alert alert-ok">Link odoslaný na <strong>${email}</strong>. Skontrolujte e-mail.</div>`;
}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  if (_loading) return;
  _loading = true;
  try {
    const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 30000));
    const [r, s, i, q] = await Promise.race([
      Promise.all([
        sb.from('requests').select('*').order('created_at', { ascending: false }),
        sb.from('specialists').select('*').order('name'),
        sb.from('invitations').select('*'),
        sb.from('quotes').select('*'),
      ]),
      timeout,
    ]);
    requests = r.data || []; specialists = s.data || [];
    invitations = i.data || []; quotes = q.data || [];
    renderRequests(); renderSpecialists();
    loadKontakty();
  } catch(e) {
    document.getElementById('reqList').innerHTML = `<div class="empty">Chyba načítania: ${e.message}. <button onclick="_loading=false;loadAll()" style="margin-left:8px;padding:4px 10px;cursor:pointer">Skúsiť znova</button></div>`;
  } finally {
    _loading = false;
  }
}

async function loadKontakty() {
  if (!cfg.url) return;
  try {
    const r = await fetch(cfg.url, { method: 'POST', body: JSON.stringify({ action: 'getKontakty' }) });
    const d = await r.json();
    if (d.ok) { contacts = d.contacts || []; renderSpecialists(); }
  } catch(e) {}
}

async function syncSpecProfessions() {
  if (!cfg.url) { showToast('Chýba URL Apps Scriptu', 'err'); return; }
  const btn = document.getElementById('btnSyncSpec');
  if (btn) { btn.disabled = true; btn.textContent = '↻ Sync…'; }
  try {
    const r = await fetch(cfg.url, { method: 'POST', body: JSON.stringify({ action: 'getKontakty' }) });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Chyba');
    contacts = d.contacts || [];
    const toUpdate = specialists
      .map(s => {
        const c = contacts.find(c => c.email === s.email);
        if (!c || !(c.labels || []).length) return null;
        const profession = c.labels.join(', ');
        if (profession === s.profession) return null;
        return { id: s.id, profession };
      })
      .filter(Boolean);
    if (!toUpdate.length) { showToast('Všetko aktuálne'); return; }
    await Promise.all(toUpdate.map(u => sb.from('specialists').update({ profession: u.profession }).eq('id', u.id)));
    showToast(`Aktualizovaných: ${toUpdate.length}`);
    _loading = false;
    await loadAll();
  } catch(e) {
    showToast('Chyba: ' + e.message, 'err');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Sync kontakty'; }
  }
}

// ── PREHĽAD CP ────────────────────────────────────────────────────────────────
function renderPrehled() {
  const el = document.getElementById('prehladList');
  if (!requests.length) { el.innerHTML = '<div class="empty">Žiadne dopyty.</div>'; return; }

  const byProj = {};
  requests.forEach(r => {
    const key = r.project_cislo + '||' + r.project_name;
    if (!byProj[key]) byProj[key] = { cislo: r.project_cislo, name: r.project_name, reqs: [] };
    byProj[key].reqs.push(r);
  });

  el.innerHTML = Object.values(byProj).map(proj => {
    let projTotal = 0;
    const rows = proj.reqs.map(r => {
      const invs = invitations.filter(i => i.request_id === r.id);
      const winner = invs.find(i => i.status === 'selected');
      const q = winner ? quotes.find(q => q.invitation_id === winner.id) : null;
      const sp = winner ? specialists.find(s => s.id === winner.specialist_id) : null;
      let total = 0;
      if (q?.prices) Object.values(q.prices).forEach(v => { if (v != null) total += Number(v); });
      projTotal += total;
      const nSub = invs.filter(i => ['submitted','selected','rejected'].includes(i.status)).length;
      const statusTxt = winner
        ? (sp?.name || '?')
        : invs.length
          ? `${nSub}/${invs.length} ponúk`
          : '<span style="color:var(--text3)">—</span>';
      return `<div class="prehled-row">
        <span style="flex:1;font-size:13px;font-weight:500">${r.profession}</span>
        <span style="font-size:12px;color:var(--text2);flex:1">${statusTxt}</span>
        <span style="font-size:13px;font-weight:${total ? '600' : '400'};color:${total ? 'var(--text)' : 'var(--text3)'};min-width:90px;text-align:right">${total ? total.toLocaleString('sk-SK') + ' €' : '—'}</span>
      </div>`;
    }).join('');

    return `<div>
      <div class="prehled-proj-hdr">
        <span>${proj.cislo ? proj.cislo + ' – ' : ''}${proj.name}</span>
        <span style="color:var(--green);font-weight:700">${projTotal ? projTotal.toLocaleString('sk-SK') + ' €' : ''}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

// ── CAFLOU AUTOCOMPLETE ───────────────────────────────────────────────────────
async function loadCaflouProjects() {
  if (!cfg.caflou_key || !cfg.caflou_id || caflouProjects.length) return;
  try {
    let all = [], page = 1;
    while (true) {
      const r = await fetch(`https://app.caflou.com/api/v1/${cfg.caflou_id}/projects?per=100&page=${page}`, {
        headers: { 'Authorization': `Bearer ${cfg.caflou_key}` }
      });
      const d = await r.json();
      const items = (d.results || []).filter(p => !p.trash && !p.template);
      all = all.concat(items);
      if (items.length < 100) break;
      page++;
    }
    caflouProjects = all;
  } catch(e) {}
}

function searchProjects(q) {
  const box = document.getElementById('mRSuggest');
  if (!q.trim() || !caflouProjects.length) { box.innerHTML = ''; return; }
  const ql = q.toLowerCase();
  const matches = caflouProjects.filter(p =>
    (p.name || '').toLowerCase().includes(ql) || (p.order_number || '').toLowerCase().includes(ql)
  ).slice(0, 8);
  if (!matches.length) { box.innerHTML = ''; return; }
  box.innerHTML = '<div class="suggest-box">' +
    matches.map(p => `<div class="suggest-item" onclick="selectProject('${(p.order_number||'').replace(/'/g,"\\'")}','${(p.name||'').replace(/'/g,"\\'")}')">
      <span style="color:var(--text3);margin-right:8px">${p.order_number || ''}</span>${p.name || ''}
    </div>`).join('') + '</div>';
}

function selectProject(cislo, name) {
  document.getElementById('mRCislo').value = cislo;
  document.getElementById('mRNazov').value = name;
  document.getElementById('mRSearch').value = (cislo ? cislo + ' – ' : '') + name;
  document.getElementById('mRSuggest').innerHTML = '';
}

document.addEventListener('click', e => {
  if (!e.target.closest('#mRSuggest') && !e.target.closest('#mRSearch'))
    document.getElementById('mRSuggest').innerHTML = '';
});

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(t) {
  ['D','R','P'].forEach(x => {
    document.getElementById('sec' + x).classList.toggle('hidden', t.toUpperCase() !== x);
    document.getElementById('tab' + x).classList.toggle('on', t.toUpperCase() === x);

// ── DOPYTY ────────────────────────────────────────────────────────────────────
function renderRequests() {
  const el = document.getElementById('reqList');
  if (!requests.length) { el.innerHTML = '<div class="empty">Žiadne dopyty. Vytvorte prvý dopyt.</div>'; return; }
  el.innerHTML = requests.map(r => {
    const invs = invitations.filter(i => i.request_id === r.id);
    const nSub = invs.filter(i => ['submitted','selected','rejected'].includes(i.status)).length;
    return `
      <div>
        <div class="row-item" onclick="toggleReq('${r.id}')">
          <span style="font-size:12px;color:var(--text3);min-width:52px">${r.project_cislo || '—'}</span>
          <span style="font-weight:500;flex:1">${r.project_name}</span>
          <span class="badge b-sent" style="margin-right:4px">${r.profession}</span>
          <span style="font-size:12px;color:var(--text2);margin-right:6px">${nSub}/${invs.length}</span>
          <span class="badge ${r.status === 'active' ? 'b-active' : 'b-closed'}">${r.status === 'active' ? 'Aktívny' : 'Uzavretý'}</span>
        </div>
        <div class="row-expand" id="rd-${r.id}">${buildReqDetail(r)}</div>
      </div>`;
  }).join('');
}

function buildReqDetail(r) {
  const invs = invitations.filter(i => i.request_id === r.id);
  const phases = Array.isArray(r.phases) ? r.phases : [];

  let tbl;
  if (!invs.length) {
    tbl = '<p style="font-size:13px;color:var(--text2);margin-bottom:12px">Zatiaľ žiadni pozvaní profesisti.</p>';
  } else {
    const phHdr = phases.map(p => `<th>${p}</th>`).join('');
    const rows = invs.map(inv => {
      const sp = specialists.find(s => s.id === inv.specialist_id);
      const q  = quotes.find(q => q.invitation_id === inv.id);
      const cells = phases.map(p => {
        const v = q?.prices?.[p];
        return `<td>${v != null ? Number(v).toLocaleString('sk-SK') + ' €' : '—'}</td>`;
      }).join('');
      const dl  = q?.deadline ? new Date(q.deadline).toLocaleDateString('sk-SK') : '—';
      const cls = inv.status === 'selected' ? 'winner' : inv.status === 'rejected' ? 'loser' : '';
      const act = inv.status === 'submitted'
        ? `<button class="btn btn-grn btn-sm" onclick="selectWinner(event,'${inv.id}','${r.id}')">Vybrať</button>`
        : inv.status === 'selected' ? '<span style="font-size:12px;color:var(--green);font-weight:500">✓ Vybraný</span>' : '';
      return `<tr class="${cls}">
        <td><strong>${sp?.name || '?'}</strong><br><span style="font-size:11px;color:var(--text3)">${sp?.company || ''}</span></td>
        ${cells}
        <td>${dl}</td>
        <td><span class="badge b-${inv.status}">${statusLabel(inv.status)}</span></td>
        <td style="white-space:nowrap">
          ${act}
          <button class="btn btn-g btn-sm" onclick="openCenyModal('${inv.id}','${r.id}')">✎ Ceny</button>
        </td>
      </tr>`;
    }).join('');
    tbl = `<div style="overflow-x:auto"><table class="qtable"><thead><tr><th>Profesista</th>${phHdr}<th>Termín</th><th>Stav</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  const phBadges = phases.map(p => `<span class="badge b-sent" style="margin-right:3px">${p}</span>`).join('');
  const fmtD = d => d ? new Date(d).toLocaleDateString('sk-SK') : null;
  const dateInfo = [
    r.deadline ? 'Termín fázy: <strong>' + fmtD(r.deadline) + '</strong>' : null,
    r.podklady_datum ? 'Podklady: <strong>' + fmtD(r.podklady_datum) + '</strong>' : null,
    r.hotovo_datum ? 'Výsledok: <strong>' + fmtD(r.hotovo_datum) + '</strong>' : null
  ].filter(Boolean).join(' · ');
  const info = `<div style="margin-bottom:6px;font-size:13px">${phBadges}${r.current_phase ? ` <span style="color:var(--text2);margin-left:4px">Aktuálna:</span> <strong>${r.current_phase}</strong>` : ''}${r.folder_url ? ` &nbsp;<a href="${r.folder_url}" target="_blank" style="color:var(--blue)">Podklady nacenenie ↗</a>` : ''}${r.folder_url_work ? ` &nbsp;<a href="${r.folder_url_work}" target="_blank" style="color:var(--blue)">Podklady vypracovanie ↗</a>` : ''}</div>`;
  const dateInfoHtml = dateInfo ? ('<div style="font-size:13px;color:var(--text2);margin-bottom:10px">' + dateInfo + '</div>') : '';
  const note = r.notes ? `<p style="font-size:13px;color:var(--text2);margin-bottom:12px">${r.notes}</p>` : '';
  const btns = `<div class="btn-row mt10">
    <button class="btn btn-p btn-sm" onclick="openInviteModal(event,'${r.id}')">+ Pozvať profesistov</button>
    <button class="btn btn-g btn-sm" onclick="openReqModal('${r.id}')">Upraviť</button>
    ${r.status === 'active'
      ? `<button class="btn btn-g btn-sm" onclick="closeReq(event,'${r.id}')">Uzavrieť</button>`
      : `<button class="btn btn-g btn-sm" onclick="reopenReq(event,'${r.id}')">Znovu otvoriť</button>`}
    <button class="btn btn-sm" onclick="deleteReq(event,'${r.id}')" style="color:var(--red);border-color:var(--red-bd);background:var(--red-bg)">Vymazať</button>
  </div>`;

  const links = invs.length ? `<div class="mt16"><p style="font-size:12px;color:var(--text2);margin-bottom:8px">Linky pre profesistov (skopírovať a poslať emailom):</p>` +
    invs.map(inv => {
      const sp  = specialists.find(s => s.id === inv.specialist_id);
      const url = `${location.origin}${location.pathname.replace('ponuky.html','portal.html')}?token=${inv.token}`;
      return `<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text2);min-width:120px">${sp?.name || '?'}:</span>
        <span class="link-code" style="flex:1">${url}</span>
        <button class="btn btn-g btn-sm" onclick="copyTxt('${url}')">Kopírovať</button>
      </div>`;
    }).join('') + '</div>' : '';

  return info + dateInfoHtml + note + tbl + btns + links;
}

function toggleReq(id) { document.getElementById('rd-' + id)?.classList.toggle('on'); }
function statusLabel(s) {
  return {sent:'Odoslané',viewed:'Otvorené',submitted:'Ponuka',selected:'Vybraný',rejected:'Nevybraný'}[s] || s;
}

async function selectWinner(e, invId, reqId) {
  e.stopPropagation();
  const invs = invitations.filter(i => i.request_id === reqId);
  await Promise.all(invs.map(i =>
    sb.from('invitations').update({ status: i.id === invId ? 'selected' : 'rejected' }).eq('id', i.id)
  ));
  const inv = invitations.find(i => i.id === invId);
  const req = requests.find(r => r.id === reqId);
  const spec = specialists.find(s => s.id === inv?.specialist_id);
  if (req && spec && cfg.caflou_key && cfg.caflou_id) {
    await loadCaflouProjects();
    const proj = caflouProjects.find(p => p.order_number === req.project_cislo);
    if (proj) {
      try {
        await fetch(`https://app.caflou.com/api/v1/${cfg.caflou_id}/tasks`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${cfg.caflou_key}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ task: {
            name: (req.profession || 'Externá úloha') + ' – ' + spec.name,
            project_id: proj.id,
            task_status_id: 1377380,
            tags: ['ext'],
          }})
        });
      } catch(e) {}
    }
  }
  await loadAll();
  document.getElementById('rd-' + reqId)?.classList.add('on');
}

async function closeReq(e, id) {
  e.stopPropagation();
  await sb.from('requests').update({ status: 'closed' }).eq('id', id);
  await loadAll();
}

async function reopenReq(e, id) {
  e.stopPropagation();
  await sb.from('requests').update({ status: 'active' }).eq('id', id);
  await loadAll();
}

async function deleteReq(e, id) {
  e.stopPropagation();
  if (!confirm('Vymazať dopyt aj so všetkými pozvánkami a ponukami?')) return;
  const invIds = invitations.filter(i => i.request_id === id).map(i => i.id);
  if (invIds.length) await sb.from('quotes').delete().in('invitation_id', invIds);
  await sb.from('invitations').delete().eq('request_id', id);
  await sb.from('requests').delete().eq('id', id);
  showToast('Dopyt vymazaný', 'ok');
  _loading = false;
  await loadAll();
}

async function deleteSpec(id) {
  if (!confirm('Vymazať profesistа?')) return;
  await sb.from('specialists').delete().eq('id', id);
  showToast('Profesista vymazaný', 'ok');
  _loading = false;
  await loadAll();
}

function copyTxt(t) { navigator.clipboard.writeText(t).catch(() => {}); }

let _cenyInvId = null, _cenyReqId = null;

function openCenyModal(invId, reqId) {
  _cenyInvId = invId;
  _cenyReqId = reqId;
  const inv = invitations.find(i => i.id === invId);
  const req = requests.find(r => r.id === reqId);
  const sp  = specialists.find(s => s.id === inv?.specialist_id);
  const q   = quotes.find(q => q.invitation_id === invId);
  const phases = Array.isArray(req?.phases) ? req.phases : [];
  document.getElementById('mCenyTitle').textContent = 'Ceny – ' + (sp?.name || '?');
  document.getElementById('mCenyNotes').value = q?.notes || '';
  document.getElementById('mCenyMsg').innerHTML = '';
  document.getElementById('mCenyFields').innerHTML = phases.map(p => {
    const val = q?.prices?.[p] ?? '';
    return `<div class="frow"><label>${p}</label>
      <input class="finput" type="number" id="cp-${p.replace(/\//g,'-')}" value="${val}" placeholder="0 €"></div>`;
  }).join('');
  document.getElementById('modalCeny').classList.remove('hidden');
}

async function saveCeny() {
  const req = requests.find(r => r.id === _cenyReqId);
  const phases = Array.isArray(req?.phases) ? req.phases : [];
  const prices = {};
  phases.forEach(p => {
    const v = document.getElementById('cp-' + p.replace(/\//g, '-'))?.value;
    if (v !== '' && v != null) prices[p] = Number(v);
  });
  const notes = document.getElementById('mCenyNotes').value.trim();
  const existing = quotes.find(q => q.invitation_id === _cenyInvId);
  let error;
  if (existing) {
    ({ error } = await sb.from('quotes').update({ prices, notes, submitted_at: new Date().toISOString() }).eq('id', existing.id));
  } else {
    ({ error } = await sb.from('quotes').insert({ invitation_id: _cenyInvId, prices, notes, submitted_at: new Date().toISOString() }));
  }
  if (!error) {
    await sb.from('invitations').update({ status: 'submitted' }).eq('id', _cenyInvId);
  }
  if (error) { document.getElementById('mCenyMsg').innerHTML = `<div style="color:var(--red);font-size:13px">${error.message}</div>`; return; }
  closeModal('modalCeny');
  showToast('Ceny uložené ✓', 'ok');
  _loading = false;
  await loadAll();
  document.getElementById('rd-' + _cenyReqId)?.classList.add('on');
}

function openReqModal(id) {

  document.getElementById('mRSuggest').innerHTML = '';

  document.getElementById('mRCurPhase').value      = r?.current_phase   || '';
  document.getElementById('mRDeadline').value      = r?.deadline        || '';
  document.getElementById('mRPodkladyDatum').value = r?.podklady_datum  || '';
  document.getElementById('mRHotovoDatum').value   = r?.hotovo_datum    || '';
  document.getElementById('mRFolder').value         = r?.folder_url      || '';
  document.getElementById('mRFolderWork').value    = r?.folder_url_work || '';
  document.getElementById('mRNotes').value         = r?.notes           || '';
  const phases = Array.isArray(r?.phases) ? r.phases : [];
  document.querySelectorAll('#phaseChks input').forEach(cb => { cb.checked = phases.includes(cb.value); });
  document.getElementById('mRMsg').innerHTML = '';
  document.getElementById('modalReq').classList.remove('hidden');

async function saveReq() {
  const nazov  = document.getElementById('mRNazov').value.trim();
  const prof   = document.getElementById('mRProf').value.trim();
  const phases = [...document.querySelectorAll('#phaseChks input:checked')].map(c => c.value);
  if (!nazov || !prof || !phases.length) {
    document.getElementById('mRMsg').innerHTML = '<div class="alert alert-err">Vyplňte názov, profesiu a aspoň jednu fázu.</div>';
    return;
  }
  const btn = document.querySelector('#modalReq .btn-p');
  if (btn) { btn.disabled = true; btn.textContent = 'Ukladám...'; }
  const data = {
    project_cislo:  document.getElementById('mRCislo').value.trim(),
    project_name:   nazov, profession: prof, phases,
    current_phase:  document.getElementById('mRCurPhase').value,
    deadline:       document.getElementById('mRDeadline').value || null,
    podklady_datum: document.getElementById('mRPodkladyDatum').value || null,
    hotovo_datum:   document.getElementById('mRHotovoDatum').value   || null,
    folder_url:      document.getElementById('mRFolder').value.trim(),
    folder_url_work: document.getElementById('mRFolderWork').value.trim(),
    notes:          document.getElementById('mRNotes').value.trim(),
  };
  const { error } = editReqId
    ? await sb.from('requests').update(data).eq('id', editReqId)
    : await sb.from('requests').insert(data);
  if (btn) { btn.disabled = false; btn.textContent = 'Uložiť'; }
  if (error) { document.getElementById('mRMsg').innerHTML = `<div class="alert alert-err">${error.message}</div>`; return; }
  closeModal('modalReq');
  showToast(editReqId ? 'Dopyt upravený' : 'Dopyt vytvorený', 'ok');
  _loading = false;
  await loadAll();
}

// ── INVITE MODAL ──────────────────────────────────────────────────────────────
function openInviteModal(e, reqId) {
  e?.stopPropagation();
  inviteReqId = reqId;
  const r = requests.find(r => r.id === reqId);
  document.getElementById('mInvDesc').textContent = `${r?.project_cislo ? r.project_cislo + ' – ' : ''}${r?.project_name} · ${r?.profession}`;

  if (contacts.length) {
    const allLabels = [...new Set(contacts.flatMap(c => c.labels || []))].sort((a,b) => a.localeCompare(b,'sk'));
    const existing  = invitations.filter(i => i.request_id === reqId).map(i => specialists.find(s => s.id === i.specialist_id)?.email).filter(Boolean);
    const prof = r?.profession?.toLowerCase() || '';
    const matchLabel = allLabels.find(l => l.toLowerCase().includes(prof) || prof.includes(l.toLowerCase())) || '';
    document.getElementById('mInvList').innerHTML = allLabels.map(label => {
      const labelContacts = contacts.filter(c => (c.labels || []).includes(label));
      if (!labelContacts.length) return '';
      const rows = labelContacts.map(c => {
        const done = existing.includes(c.email);
        return `<label style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:${done?'default':'pointer'}">
          <input type="checkbox" data-email="${c.email}" ${done ? 'disabled checked' : ''}>
          <span style="flex:1"><strong>${c.name}</strong>${c.company ? ' · ' + c.company : ''}</span>
          ${done ? '<span class="badge b-sent">Pozvaný</span>' : ''}
        </label>`;
      }).join('');
      return `<details ${label === matchLabel ? 'open' : ''} style="margin-bottom:4px">
        <summary style="font-size:13px;font-weight:600;cursor:pointer;padding:6px 0;list-style:none;display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;color:var(--text3)">▶</span>${label}
          <span style="font-weight:400;font-size:12px;color:var(--text3)">(${labelContacts.length})</span>
        </summary>
        <div style="padding-left:4px">${rows}</div>
      </details>`;
    }).join('');
  } else {
    const existing = invitations.filter(i => i.request_id === reqId).map(i => i.specialist_id);
    document.getElementById('mInvList').innerHTML = specialists.length
      ? specialists.map(s => {
          const done = existing.includes(s.id);
          return `<label style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);cursor:${done ? 'default' : 'pointer'}">
            <input type="checkbox" value="${s.id}" ${done ? 'disabled checked' : ''}>
            <span style="flex:1"><strong>${s.name}</strong>${s.company ? ' · ' + s.company : ''} <span style="color:var(--text3);font-size:12px">${s.profession || ''}</span></span>
            ${done ? '<span class="badge b-sent">Pozvaný</span>' : ''}
          </label>`;
        }).join('')
      : '<p style="font-size:13px;color:var(--text2)">Pridajte najprv profesistov v záložke Profesisti.</p>';
  }

  document.getElementById('mInvMsg').innerHTML = '';
  document.getElementById('modalInvite').classList.remove('hidden');
}


async function doInvite() {
  const msgEl = document.getElementById('mInvMsg');

  if (contacts.length) {
    const sel = [...document.querySelectorAll('#mInvList input[data-email]:checked:not(:disabled)')];
    if (!sel.length) { msgEl.innerHTML = '<div class="alert alert-err">Vyberte aspoň jedného.</div>'; return; }

    const toUpsert = sel.map(cb => {
      const c = contacts.find(x => x.email === cb.dataset.email);
      return { email: c.email, name: c.name, company: c.company || '', profession: (c.labels || []).join(', '), phone: c.phone || '' };
    });
    const { data: upserted, error: upsErr } = await sb.from('specialists')
      .upsert(toUpsert, { onConflict: 'email' }).select('id, email');
    if (upsErr) { msgEl.innerHTML = `<div class="alert alert-err">${upsErr.message}</div>`; return; }

    const { error } = await sb.from('invitations').insert(
      upserted.map(u => ({ request_id: inviteReqId, specialist_id: u.id }))
    );
    if (error) { msgEl.innerHTML = `<div class="alert alert-err">${error.message}</div>`; return; }
  } else {
    const sel = [...document.querySelectorAll('#mInvList input:checked:not(:disabled)')];
    if (!sel.length) { msgEl.innerHTML = '<div class="alert alert-err">Vyberte aspoň jedného.</div>'; return; }
    const { error } = await sb.from('invitations').insert(sel.map(cb => ({ request_id: inviteReqId, specialist_id: cb.value })));
    if (error) { msgEl.innerHTML = `<div class="alert alert-err">${error.message}</div>`; return; }
  }

  closeModal('modalInvite');
  await loadAll();
  document.getElementById('rd-' + inviteReqId)?.classList.add('on');
}

// ── PROFESISTI ────────────────────────────────────────────────────────────────
function renderSpecialists() {
  const el = document.getElementById('specList');

  if (contacts.length) {
    const byLabel = {};
    contacts.forEach(c => {
      const lbls = c.labels && c.labels.length ? c.labels : ['—'];
      lbls.forEach(l => {
        if (!byLabel[l]) byLabel[l] = [];
        if (!byLabel[l].find(x => x.email === c.email)) byLabel[l].push(c);
      });
    });
    el.innerHTML = Object.entries(byLabel).sort((a,b) => a[0].localeCompare(b[0],'sk')).map(([label, ctcs]) =>
      `<div style="padding:8px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border)">${label}</div>` +
      ctcs.map(c => {
        const sp = specialists.find(s => s.email === c.email);
        const portalUrl = sp?.portal_token ? `${location.origin}${location.pathname.replace('ponuky.html','portal.html')}?specialist=${sp.portal_token}` : null;
        return `<div class="row-item" style="cursor:default">
          <div style="flex:1;line-height:1.5">
            <strong>${c.name}</strong>${c.company ? ` <span style="color:var(--text2)">· ${c.company}</span>` : ''}
            <br><span style="font-size:12px;color:var(--text2)">${c.email}${c.phone ? ' · ' + c.phone : ''}</span>
          </div>
          ${portalUrl ? `<button class="btn btn-g btn-sm" title="${portalUrl}" onclick="copyTxt('${portalUrl}');showToast('Link skopírovaný')">🔗 Portál</button>` : ''}
          ${sp
            ? `<button class="btn btn-g btn-sm" onclick="openSpecModal('${sp.id}')">Upraviť</button>`
            : `<button class="btn btn-g btn-sm" onclick="addKontakt('${c.email.replace(/'/g,"\\'")}')">Pridať</button>`}
        </div>`;
      }).join('')
    ).join('');
    return;
  }

  if (!specialists.length) { el.innerHTML = '<div class="empty">Žiadni profesisti. Pridajte prvého.</div>'; return; }
  el.innerHTML = specialists.map(s => {
    const portalUrl = s.portal_token ? `${location.origin}${location.pathname.replace('ponuky.html','portal.html')}?specialist=${s.portal_token}` : null;
    return `<div class="row-item" style="cursor:default">
      <div style="flex:1;line-height:1.5">
        <strong>${s.name}</strong>${s.company ? ` <span style="color:var(--text2)">· ${s.company}</span>` : ''}
        ${s.profession ? `<span class="badge b-sent" style="margin-left:6px">${s.profession}</span>` : ''}
        <br><span style="font-size:12px;color:var(--text2)">${s.email}${s.phone ? ' · ' + s.phone : ''}</span>
      </div>
      ${portalUrl ? `<button class="btn btn-g btn-sm" title="${portalUrl}" onclick="copyTxt('${portalUrl}');showToast('Link skopírovaný')">🔗 Portál</button>` : ''}
      <button class="btn btn-g btn-sm" onclick="openSpecModal('${s.id}')">Upraviť</button>
      <button class="btn btn-sm" onclick="deleteSpec('${s.id}')" style="color:var(--red);border-color:var(--red-bd);background:var(--red-bg)">×</button>
    </div>`;
  }).join('');
}

function addKontakt(email) {
  const c = contacts.find(x => x.email === email);
  if (!c) return;
  editSpecId = null;
  document.getElementById('mSpecTitle').textContent = 'Pridať profesista';
  document.getElementById('mSName').value    = c.name;
  document.getElementById('mSCompany').value = c.company || '';
  document.getElementById('mSEmail').value   = c.email;
  document.getElementById('mSProf').value    = (c.labels || []).join(', ');
  document.getElementById('mSPhone').value   = c.phone || '';
  document.getElementById('mSNotes').value   = '';
  document.getElementById('mSMsg').innerHTML = '';
  document.getElementById('modalSpec').classList.remove('hidden');
}

function openSpecModal(id) {
  editSpecId = id || null;
  const s = id ? specialists.find(s => s.id === id) : null;
  document.getElementById('mSpecTitle').textContent = s ? 'Upraviť profesista' : 'Pridať profesista';
  document.getElementById('mSName').value    = s?.name       || '';
  document.getElementById('mSCompany').value = s?.company    || '';
  document.getElementById('mSEmail').value   = s?.email      || '';
  document.getElementById('mSProf').value    = s?.profession || '';
  document.getElementById('mSPhone').value   = s?.phone      || '';
  document.getElementById('mSNotes').value   = s?.notes      || '';
  document.getElementById('mSMsg').innerHTML = '';
  document.getElementById('modalSpec').classList.remove('hidden');
}

async function saveSpec() {
  const name  = document.getElementById('mSName').value.trim();
  const email = document.getElementById('mSEmail').value.trim();
  if (!name || !email) { document.getElementById('mSMsg').innerHTML = '<div class="alert alert-err">Meno a e-mail sú povinné.</div>'; return; }
  const data = { name, email,
    company:    document.getElementById('mSCompany').value.trim(),
    profession: document.getElementById('mSProf').value.trim(),
    phone:      document.getElementById('mSPhone').value.trim(),
    notes:      document.getElementById('mSNotes').value.trim(),
  };
  const btn = document.querySelector('#modalSpec .btn-p');
  if (btn) { btn.disabled = true; btn.textContent = 'Ukladám...'; }
  const { error } = editSpecId
    ? await sb.from('specialists').update(data).eq('id', editSpecId)
    : await sb.from('specialists').insert(data);
  if (btn) { btn.disabled = false; btn.textContent = 'Uložiť'; }
  if (error) { document.getElementById('mSMsg').innerHTML = `<div class="alert alert-err">${error.message}</div>`; return; }
  closeModal('modalSpec');
  showToast(editSpecId ? 'Profesista upravený' : 'Profesista pridaný', 'ok');
  _loading = false;
  await loadAll();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('.overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.add('hidden'); })
);

function showToast(msg, type) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.className = 'toast toast-' + (type || 'ok');
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}
</script>
</body>
