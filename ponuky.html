<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponuky profesií</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f5f3ef; --bg2:#fff; --bg3:#f0ede8;
      --border:#e4dfd8; --border2:#c8bfb5;
      --text:#2c2825; --text2:#6b6460; --text3:#9e9590;
      --green:#1e7a4a; --grn-bg:#f0faf5; --grn-bd:#b8e6cc;
      --blue:#1a5fa0; --blu-bg:#f0f6fd; --blu-bd:#b8d4f0;
      --orange:#c96a1a; --ora-bg:#fdf6f0; --ora-bd:#f5d9be;
      --red:#c0392b; --red-bg:#fdf2f1; --red-bd:#f5c6c2;
      --sans:'DM Sans',system-ui,sans-serif;
      --r:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}

    .module-nav{background:var(--text);display:flex;padding:0 12px;overflow-x:auto;scrollbar-width:none}
    .module-nav::-webkit-scrollbar{display:none}
    .mnav-a{color:rgba(245,243,239,.45);text-decoration:none;padding:9px 10px;font-size:12px;font-weight:500;white-space:nowrap;border-bottom:2px solid transparent}
    .mnav-a.cur,.mnav-a:hover{color:#f5f3ef}
    .mnav-a.cur{border-bottom-color:rgba(245,243,239,.55)}

    .page-hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px;position:sticky;top:0;z-index:50}
    .page-hdr h1{font-size:16px;font-weight:600;flex:1}

    .main{max-width:880px;margin:0 auto;padding:20px 16px}

    #loginWrap{max-width:380px;margin:60px auto;padding:0 16px}
    .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:28px}
    .login-card h2{font-size:18px;margin-bottom:6px}
    .login-card p{color:var(--text2);font-size:13px;margin-bottom:20px}

    .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
    .tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
    .tab.on{color:var(--blue);border-bottom-color:var(--blue)}

    .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .card+.card{margin-top:12px}

    .row-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
    .row-item:last-of-type{border-bottom:none}
    .row-item:hover{background:var(--bg3)}
    .row-expand{display:none;padding:16px;border-top:1px solid var(--border);background:var(--bg3)}
    .row-expand.on{display:block}

    .badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500}
    .b-sent{background:var(--blu-bg);color:var(--blue);border:1px solid var(--blu-bd)}
    .b-viewed{background:var(--ora-bg);color:var(--orange);border:1px solid var(--ora-bd)}
    .b-submitted{background:var(--grn-bg);color:var(--green);border:1px solid var(--grn-bd)}
    .b-selected{background:var(--green);color:#fff}
    .b-rejected{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
    .b-active{background:var(--grn-bg);color:var(--green);border:1px solid var(--grn-bd)}
    .b-closed{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

    .qtable{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
    .qtable th{text-align:left;padding:7px 8px;border-bottom:2px solid var(--border);color:var(--text2);font-weight:500;font-size:12px}
    .qtable td{padding:8px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
    .qtable tr:last-child td{border-bottom:none}
    .qtable tr.winner{background:var(--grn-bg)}
    .qtable tr.loser{opacity:.5}

    .frow{margin-bottom:14px}
    .frow label{display:block;font-size:12px;color:var(--text2);font-weight:500;margin-bottom:5px}
    .finput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:14px;color:var(--text);font-family:var(--sans);outline:none}
    .finput:focus{border-color:var(--blue);background:var(--bg2)}
    textarea.finput{resize:vertical;min-height:70px}
    .frow-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:480px){.frow-2{grid-template-columns:1fr}}

    .chk-grid{display:flex;flex-wrap:wrap;gap:8px}
    .chk-lbl{display:flex;align-items:center;gap:5px;font-size:13px;padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;cursor:pointer}
    .chk-lbl:has(input:checked){background:var(--blu-bg);border-color:var(--blu-bd);color:var(--blue)}

    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;border:none;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer}
    .btn-p{background:var(--text);color:#f5f3ef}
    .btn-p:hover{background:#1a1614}
    .btn-g{background:transparent;color:var(--text2);border:1px solid var(--border)}
    .btn-g:hover{background:var(--bg3)}
    .btn-grn{background:var(--green);color:#fff}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap}

    .overlay{position:fixed;inset:0;background:rgba(44,40,37,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:32px 12px;overflow-y:auto}
    .modal{background:var(--bg2);border-radius:var(--r);padding:22px;width:100%;max-width:540px}
    .modal h3{font-size:16px;margin-bottom:18px}

    .alert{padding:10px 13px;border-radius:7px;font-size:13px;margin-bottom:12px}
    .alert-ok{background:var(--grn-bg);color:var(--green);border:1px solid var(--grn-bd)}
    .alert-err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

    .link-code{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:11px;font-family:monospace;word-break:break-all;color:var(--text2)}
    .suggest-box{position:absolute;z-index:200;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:7px;box-shadow:0 4px 16px rgba(0,0,0,.1);margin-top:2px;max-height:220px;overflow-y:auto}
    .suggest-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px}
    .suggest-item:last-child{border-bottom:none}
    .suggest-item:hover{background:var(--bg3)}
    .prehled-proj-hdr{padding:10px 14px;font-size:13px;font-weight:600;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .prehled-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:10px}
    .prehled-row:last-child{border-bottom:none}
    .hidden{display:none!important}
    .mt10{margin-top:10px}
    .mt16{margin-top:16px}
    .empty{padding:24px 16px;color:var(--text2);font-size:13px;text-align:center}
    .toast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-size:14px;font-weight:500;z-index:9999;white-space:nowrap}
    .toast-ok{background:var(--grn-bg);color:var(--green);border:1px solid var(--grn-bd)}
    .toast-err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>

<nav class="module-nav">
  <a href="index.html" class="mnav-a">Projekty</a>
  <a href="ponuky.html" class="mnav-a cur">Ponuky profesií</a>
  <a href="suhrn.html" class="mnav-a">Správy</a>
</nav>

<div id="authLoading" style="text-align:center;padding:60px 16px;color:var(--text2);font-size:13px">Načítavam…</div>

<!-- LOGIN -->
<div id="loginWrap" class="hidden">
  <div class="login-card">
    <h2>Ponuky profesií</h2>
    <p>Prihláste sa pomocou e-mailovej adresy.</p>
    <div class="frow">
      <label>E-mail</label>
      <input class="finput" type="email" id="loginEmail" placeholder="vas@email.com">
    </div>
    <div id="loginMsg"></div>
    <button class="btn btn-p" style="width:100%;justify-content:center" onclick="sendMagicLink()">Poslať prihlasovací link</button>
  </div>
</div>

<!-- ADMIN -->
<div id="adminWrap" class="hidden">
  <div class="page-hdr">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:5px;color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;padding:5px 8px;border:1px solid var(--border);border-radius:7px;background:var(--bg3);flex-shrink:0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M15 18l-6-6 6-6"/></svg>
      Projekty
    </a>
    <h1>Ponuky profesií</h1>
    <span style="font-size:12px;color:var(--text3)" id="navEmail"></span>
    <button class="btn btn-g btn-sm" onclick="sb.auth.signOut()">Odhlásiť</button>
  </div>
  <div class="main">
    <div class="tabs">
      <div class="tab on" id="tabD" onclick="switchTab('d')">Dopyty</div>
      <div class="tab" id="tabR" onclick="switchTab('r')">Prehľad CP</div>
      <div class="tab" id="tabP" onclick="switchTab('p')">Profesisti</div>
    </div>

    <div id="secD">
      <div class="btn-row" style="margin-bottom:14px">
        <button class="btn btn-p btn-sm" onclick="openReqModal()">+ Nový dopyt</button>
      </div>
      <div class="card" id="reqList"><div class="empty">Načítavam...</div></div>
    </div>

    <div id="secR" class="hidden">
      <div class="card" id="prehladList"><div class="empty">Načítavam...</div></div>
    </div>

    <div id="secP" class="hidden">
      <div class="btn-row" style="margin-bottom:14px">
        <button class="btn btn-p btn-sm" onclick="openSpecModal()">+ Pridať profesista</button>
        <button id="btnSyncSpec" class="btn btn-sm" onclick="syncSpecProfessions()" style="margin-left:8px">↻ Sync kontakty</button>
      </div>
      <input id="specSearch" type="search" placeholder="Hľadať profesistov…" oninput="renderSpecialists()"
        style="width:100%;box-sizing:border-box;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg2);color:var(--text);margin-bottom:10px;outline:none">
      <div class="card" id="specList"><div class="empty">Načítavam...</div></div>
    </div>
  </div>
</div>

<!-- MODAL: Dopyt -->
<div class="overlay hidden" id="modalReq">
<div class="modal">
  <h3 id="mReqTitle">Nový dopyt</h3>
  <div class="frow" style="position:relative">
    <label>Projekt</label>
    <input class="finput" id="mRSearch" placeholder="Hľadaj podľa názvu alebo čísla..." autocomplete="off" oninput="searchProjects(this.value)">
    <div id="mRSuggest"></div>
  </div>
  <div class="frow-2">
    <div class="frow"><label>Číslo projektu</label><input class="finput" id="mRCislo" placeholder="24-021"></div>
    <div class="frow"><label>Názov projektu</label><input class="finput" id="mRNazov" placeholder="BD Nitra"></div>
  </div>
  <div class="frow"><label>Profesia</label><input class="finput" id="mRProf" placeholder="Statik, TZB, Požiarnik..."></div>
  <div class="frow" id="mRTaskWrap" style="display:none">
    <label>Caflou úloha (voliteľné)</label>
    <div id="mRTaskContent"><select class="finput" id="mRTaskSel"><option value="">— bez prepojenia —</option></select></div>
  </div>
  <div class="frow">
    <label>Fázy – pre ktoré chcete cenu</label>
    <div class="chk-grid" id="phaseChks">
      <label class="chk-lbl"><input type="checkbox" value="SZ"> Stavebný zámer</label>
      <label class="chk-lbl"><input type="checkbox" value="DSP/PS"> Projekt stavby</label>
      <label class="chk-lbl"><input type="checkbox" value="RP"> Realizačný projekt</label>
      <label class="chk-lbl"><input type="checkbox" value="UP"> Územný plán</label>
      <label class="chk-lbl"><input type="checkbox" value="Studia"> Štúdia</label>
      <label class="chk-lbl"><input type="checkbox" value="Inziniering"> Inžiniering</label>
    </div>
  </div>
  <div class="frow-2">
    <div class="frow">
      <label>Aktuálna fáza (pre termín)</label>
      <select class="finput" id="mRCurPhase">
        <option value="">– vybrať –</option>
        <option value="SZ">Stavebný zámer</option>
        <option value="DSP/PS">Projekt stavby</option>
        <option value="RP">Realizačný projekt</option>
        <option value="UP">Územný plán</option>
        <option value="Studia">Štúdia</option>
        <option value="Inziniering">Inžiniering</option>
      </select>
    </div>
    <div class="frow"><label>Termín odovzdania fázy</label><input class="finput" type="date" id="mRDeadline"></div>
  </div>
  <div class="frow-2">
    <div class="frow"><label>Kedy dodáme podklady</label><input class="finput" type="date" id="mRPodkladyDatum"></div>
    <div class="frow"><label>Kedy chceme výsledok</label><input class="finput" type="date" id="mRHotovoDatum"></div>
  </div>
  <div class="frow"><label>Link na podklady na nacenenie</label><input class="finput" type="url" id="mRFolder" placeholder="https://drive.google.com/..."></div>
  <div class="frow"><label>Link na podklady na vypracovanie</label><input class="finput" type="url" id="mRFolderWork" placeholder="https://drive.google.com/..."></div>
  <div class="frow"><label>Poznámka / špecifikácia</label><textarea class="finput" id="mRNotes" rows="3" placeholder="Opis predmetu, osobitné požiadavky..."></textarea></div>
  <div id="mRMsg"></div>
  <div class="btn-row">
    <button class="btn btn-p" onclick="saveReq()">Uložiť</button>
    <button class="btn btn-g" onclick="closeModal('modalReq')">Zrušiť</button>
  </div>
</div>
</div>

<!-- MODAL: Profesista -->
<div class="overlay hidden" id="modalSpec">
<div class="modal">
  <h3 id="mSpecTitle">Pridať profesista</h3>
  <div class="frow-2">
    <div class="frow"><label>Meno a priezvisko *</label><input class="finput" id="mSName" placeholder="Ing. Ján Novák"></div>
    <div class="frow"><label>Firma</label><input class="finput" id="mSCompany" placeholder="Novák Statika s.r.o."></div>
  </div>
  <div class="frow-2">
    <div class="frow"><label>E-mail *</label><input class="finput" type="email" id="mSEmail" placeholder="jan@example.sk"></div>
    <div class="frow"><label>Profesia</label><input class="finput" id="mSProf" placeholder="Statik, TZB..."></div>
  </div>
  <div class="frow-2">
    <div class="frow"><label>Telefón</label><input class="finput" id="mSPhone" placeholder="+421 900 000 000"></div>
    <div class="frow"><label>Reg. číslo oprávnenia</label><input class="finput" id="mSReg" placeholder="XXXX AA"></div>
  </div>
  <div class="frow"><label>Poznámka</label><textarea class="finput" id="mSNotes" rows="2"></textarea></div>
  <div id="mSMsg"></div>
  <div class="btn-row">
    <button class="btn btn-p" onclick="saveSpec()">Uložiť</button>
    <button class="btn btn-g" onclick="closeModal('modalSpec')">Zrušiť</button>
  </div>
</div>
</div>

<!-- MODAL: Pozvánky -->
<div class="overlay hidden" id="modalInvite">
<div class="modal">
  <h3>Pozvať profesistov</h3>
  <p id="mInvDesc" style="font-size:13px;color:var(--text2);margin-bottom:14px"></p>
  <div id="mInvList" style="max-height:320px;overflow-y:auto;margin-bottom:14px"></div>
  <div id="mInvMsg"></div>
  <div class="btn-row">
    <button class="btn btn-p" onclick="doInvite()">Vygenerovať linky</button>
    <button class="btn btn-g" onclick="closeModal('modalInvite')">Zavrieť</button>
  </div>
</div>
</div>

<!-- MODAL: Zadať ceny -->
<div class="overlay hidden" id="modalCeny">
<div class="modal">
  <h3 id="mCenyTitle">Zadať ceny</h3>
  <div id="mCenyFields" style="margin-bottom:14px"></div>
  <div class="frow"><label>Poznámka</label><textarea class="finput" id="mCenyNotes" rows="2"></textarea></div>
  <div id="mCenyMsg"></div>
  <div class="btn-row">
    <button class="btn btn-p" onclick="saveCeny()">Uložiť</button>
    <button class="btn btn-g" onclick="closeModal('modalCeny')">Zavrieť</button>
  </div>
</div>
</div>

<script>
const SB_URL = 'https://cfjkomqxzqflotrqxfyl.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmamtvbXF4enFmbG90cnF4ZnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTM1NjksImV4cCI6MjA5MzUyOTU2OX0.GUnw0I0wDrkIwaJ15TnpF_8zghW_8yIM_MZlyLF1dH8';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const cfg = JSON.parse(localStorage.getItem('pmCfg3') || '{}');
let requests = [], specialists = [], invitations = [], quotes = [], contacts = [], caflouProjects = [];
let editReqId = null, editSpecId = null, inviteReqId = null;
let _loading = false;

// ── AUTH ──────────────────────────────────────────────────────────────────────
const VAPID_PUBLIC = 'BOSSTeG8Zqt4zTxp_JFUlSMYKZrz38XalGjIdZeZcCF2x7Iv8QW0-4FBqdDhzeZK1u4AAyJ6vPIij4USnbC1ymU';
function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}
async function initPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (Notification.permission !== 'granted') return;
  try {
    const reg = await navigator.serviceWorker.register('./sw.js');
    await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC),
      });
      await sb.from('push_subscriptions').upsert({ endpoint: sub.endpoint, subscription: sub.toJSON() }, { onConflict: 'endpoint' }).then(null, () => {});
    }
  } catch(e) {}
}

// Optimistic: zobraz admin panel okamžite z localStorage (bez čakania na token refresh)
let _initialLoadDone = false;
(async function() {
  try {
    const raw = localStorage.getItem('sb-cfjkomqxzqflotrqxfyl-auth-token');
    const s = raw ? JSON.parse(raw) : null;
    if (s?.user?.email) {
      document.getElementById('authLoading').classList.add('hidden');
      document.getElementById('loginWrap').classList.add('hidden');
      document.getElementById('adminWrap').classList.remove('hidden');
      document.getElementById('navEmail').textContent = s.user.email;
      _initialLoadDone = true;
      await loadAll();
      initPush();
      openFromUrl();
    }
  } catch(e) {}
})();

sb.auth.onAuthStateChange(async (event, session) => {
  document.getElementById('authLoading').classList.add('hidden');
  if (event === 'SIGNED_OUT') {
    _initialLoadDone = false;
    document.getElementById('loginWrap').classList.remove('hidden');
    document.getElementById('adminWrap').classList.add('hidden');
    return;
  }
  if (session) {
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('adminWrap').classList.remove('hidden');
    document.getElementById('navEmail').textContent = session.user.email;
    if (!_initialLoadDone) {
      _initialLoadDone = true;
      await loadAll();
      initPush();
      openFromUrl();
    }
  } else if (!_initialLoadDone) {
    document.getElementById('loginWrap').classList.remove('hidden');
    document.getElementById('adminWrap').classList.add('hidden');
  }
});

async function sendMagicLink() {
  const email = document.getElementById('loginEmail').value.trim();
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: 'https://architt-ctrl.github.io/prehladpm/ponuky.html' } });
  const el = document.getElementById('loginMsg');
  if (error) el.innerHTML = `<div class="alert alert-err">${error.message}</div>`;
  else el.innerHTML = `<div class="alert alert-ok">Link odoslaný na <strong>${email}</strong>. Skontrolujte e-mail.</div>`;
}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  if (_loading) return;
  _loading = true;
  document.getElementById('reqList').innerHTML = '<div class="empty" style="color:var(--text2)">Načítavam…</div>';
  const t0 = performance.now();
  try {
    const tout = new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout — skontrolujte pripojenie')), 30000));
    const [rRes, sRes, iRes, qRes] = await Promise.race([
      Promise.all([
        sb.from('requests').select('*').order('created_at', { ascending: false }),
        sb.from('specialists').select('id,name,company,email,profession,phone,portal_token,notes').order('name'),
        sb.from('invitations').select('id,request_id,specialist_id,token,status'),
        sb.from('quotes').select('id,invitation_id,prices,notes,submitted_at,deadline'),
      ]),
      tout,
    ]);
    console.log(`loadAll queries: ${Math.round(performance.now()-t0)}ms`);
    requests = rRes.data || []; specialists = sRes.data || [];
    invitations = iRes.data || []; quotes = qRes.data || [];
    renderRequests(); renderSpecialists();
    console.log(`loadAll render: ${Math.round(performance.now()-t0)}ms`);
  } catch(e) {
    document.getElementById('reqList').innerHTML = `<div class="empty">Chyba načítania: ${e.message}. <button onclick="_loading=false;loadAll()" style="margin-left:8px;padding:4px 10px;cursor:pointer">Skúsiť znova</button></div>`;
  } finally {
    _loading = false;
  }
}

async function loadKontakty() {
  if (!cfg.url) return;
  try {
    const r = await fetch(cfg.url, { method: 'POST', body: JSON.stringify({ action: 'getKontakty' }) });
    const d = await r.json();
    if (d.ok) { contacts = d.contacts || []; renderSpecialists(); }
  } catch(e) {}
}

async function syncSpecProfessions() {
  if (!cfg.url) { showToast('Chýba URL Apps Scriptu', 'err'); return; }
  const btn = document.getElementById('btnSyncSpec');
  if (btn) { btn.disabled = true; btn.textContent = '↻ Sync…'; }
  try {
    const r = await fetch(cfg.url, { method: 'POST', body: JSON.stringify({ action: 'getKontakty' }) });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Chyba');
    contacts = d.contacts || [];
    const existingEmails = new Set(specialists.map(s => s.email).filter(Boolean));

    const toUpdate = specialists
      .map(s => {
        const c = contacts.find(c => c.email === s.email);
        if (!c || !(c.labels || []).length) return null;
        const profession = c.labels.join(', ');
        if (profession === s.profession) return null;
        return { id: s.id, profession };
      })
      .filter(Boolean);

    const toInsert = contacts.filter(c =>
      c.email &&
      !existingEmails.has(c.email) &&
      (c.labels || []).some(l => l.toLowerCase() !== 'klient')
    ).map(c => ({
      name: c.name || '',
      email: c.email,
      profession: (c.labels || []).filter(l => l.toLowerCase() !== 'klient').join(', ')
    }));

    if (!toUpdate.length && !toInsert.length) { showToast('Všetko aktuálne'); return; }
    const ops = [];
    if (toUpdate.length) ops.push(Promise.all(toUpdate.map(u => sb.from('specialists').update({ profession: u.profession }).eq('id', u.id))));
    if (toInsert.length) ops.push(sb.from('specialists').insert(toInsert));
    await Promise.all(ops);
    const parts = [];
    if (toUpdate.length) parts.push(`aktualizovaných: ${toUpdate.length}`);
    if (toInsert.length) parts.push(`pridaných: ${toInsert.length}`);
    showToast(parts.join(', '));
    _loading = false;
    await loadAll();
  } catch(e) {
    showToast('Chyba: ' + e.message, 'err');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Sync kontakty'; }
  }
}

// ── PREHĽAD CP ────────────────────────────────────────────────────────────────
function renderPrehled() {
  const el = document.getElementById('prehladList');
  if (!requests.length) { el.innerHTML = '<div class="empty">Žiadne dopyty.</div>'; return; }

  const byProj = {};
  requests.forEach(r => {
    const key = r.project_cislo + '||' + r.project_name;
    if (!byProj[key]) byProj[key] = { cislo: r.project_cislo, name: r.project_name, reqs: [] };
    byProj[key].reqs.push(r);
  });

  el.innerHTML = Object.values(byProj).map(proj => {
    let projTotal = 0;
    const rows = proj.reqs.map(r => {
      const invs = invitations.filter(i => i.request_id === r.id);
      const winner = invs.find(i => i.status === 'selected');
      const q = winner ? quotes.find(q => q.invitation_id === winner.id) : null;
      const sp = winner ? specialists.find(s => s.id === winner.specialist_id) : null;
      let total = 0;
      if (q?.prices) Object.values(q.prices).forEach(v => { if (v != null) total += Number(v); });
      projTotal += total;
      const nSub = invs.filter(i => ['submitted','selected','rejected'].includes(i.status)).length;
      const statusTxt = winner
        ? (sp?.name || '?')
        : invs.length
          ? `${nSub}/${invs.length} ponúk`
          : '<span style="color:var(--text3)">—</span>';
      return `<div class="prehled-row">
        <span style="flex:1;font-size:13px;font-weight:500">${r.profession}</span>
        <span style="font-size:12px;color:var(--text2);flex:1">${statusTxt}</span>
        <span style="font-size:13px;font-weight:${total ? '600' : '400'};color:${total ? 'var(--text)' : 'var(--text3)'};min-width:90px;text-align:right">${total ? total.toLocaleString('sk-SK') + ' €' : '—'}</span>
      </div>`;
    }).join('');

    return `<div>
      <div class="prehled-proj-hdr">
        <span>${proj.cislo ? proj.cislo + ' – ' : ''}${proj.name}</span>
        <span style="color:var(--green);font-weight:700">${projTotal ? projTotal.toLocaleString('sk-SK') + ' €' : ''}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

// ── CAFLOU AUTOCOMPLETE ───────────────────────────────────────────────────────
async function loadCaflouProjects() {
  if (!cfg.caflou_key || !cfg.caflou_id || caflouProjects.length) return;
  try {
    let all = [], page = 1;
    while (true) {
      const r = await fetch(`https://app.caflou.com/api/v1/${cfg.caflou_id}/projects?per=100&page=${page}`, {
        headers: { 'Authorization': `Bearer ${cfg.caflou_key}` }
      });
      const d = await r.json();
      const items = (d.results || []).filter(p => !p.trash && !p.template);
      all = all.concat(items);
      if (items.length < 100) break;
      page++;
    }
    caflouProjects = all;
  } catch(e) {}
}

function searchProjects(q) {
  const box = document.getElementById('mRSuggest');
  if (!q.trim() || !caflouProjects.length) { box.innerHTML = ''; return; }
  const ql = q.toLowerCase();
  const matches = caflouProjects.filter(p =>
    (p.name || '').toLowerCase().includes(ql) || (p.order_number || '').toLowerCase().includes(ql)
  ).slice(0, 8);
  if (!matches.length) { box.innerHTML = ''; return; }
  box.innerHTML = '<div class="suggest-box">' +
    matches.map(p => `<div class="suggest-item" onclick="selectProject('${(p.order_number||'').replace(/'/g,"\\'")}','${(p.name||'').replace(/'/g,"\\'")}')">
      <span style="color:var(--text3);margin-right:8px">${p.order_number || ''}</span>${p.name || ''}
    </div>`).join('') + '</div>';
}

function selectProject(cislo, name) {
  document.getElementById('mRCislo').value = cislo;
  document.getElementById('mRNazov').value = name;
  document.getElementById('mRSearch').value = (cislo ? cislo + ' – ' : '') + name;
  document.getElementById('mRSuggest').innerHTML = '';
  loadTasksForModal(cislo);
}

async function loadTasksForModal(cislo, selectedTaskId = null) {
  const wrap = document.getElementById('mRTaskWrap');
  const content = document.getElementById('mRTaskContent');
  if (!wrap) return;
  if (!cfg.caflou_key || !cislo) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  content.innerHTML = '<span style="font-size:13px;color:var(--text3)">Načítavam úlohy…</span>';
  try {
    await loadCaflouProjects();
    const proj = caflouProjects.find(p => p.order_number === cislo);
    if (!proj) { content.innerHTML = '<span style="font-size:13px;color:var(--text3)">Projekt nenájdený v Caflou.</span>'; return; }
    const taskIdSet = new Set((proj.task_ids || []).map(Number));
    let tasks = [], page = 1, tp = 1;
    while (page <= tp) {
      const res = await fetch(
        `https://app.caflou.com/api/v1/${cfg.caflou_id}/tasks?project_id=${proj.id}&per=100&page=${page}`,
        { headers: { Authorization: `Bearer ${cfg.caflou_key}` } }
      );
      const d = await res.json();
      const batch = (d.results || []).filter(t => taskIdSet.size === 0 || taskIdSet.has(Number(t.id)));
      tasks = tasks.concat(batch);
      if (taskIdSet.size > 0 && tasks.length >= taskIdSet.size) break;
      tp = d.total_pages || 1; page++;
    }
    const active = tasks.filter(t => !t.finished);
    active.sort((a, b) => {
      const ae = (a.tags || []).includes('ext'), be = (b.tags || []).includes('ext');
      return ae === be ? 0 : ae ? -1 : 1;
    });
    if (!active.length) { content.innerHTML = '<span style="font-size:13px;color:var(--text3)">Projekt nemá aktívne úlohy.</span>'; return; }
    const opts = active.map(t => {
      const ext = (t.tags || []).includes('ext') ? ' [ext]' : '';
      return `<option value="${t.id}"${Number(t.id) === Number(selectedTaskId) ? ' selected' : ''}>${t.name}${ext}</option>`;
    }).join('');
    content.innerHTML = `<select class="finput" id="mRTaskSel"><option value="">— bez prepojenia —</option>${opts}</select>`;
  } catch(e) {
    content.innerHTML = `<span style="font-size:13px;color:var(--red)">Chyba: ${e.message}</span>`;
  }
}

document.addEventListener('click', e => {

  ['D','R','P'].forEach(x => {
    document.getElementById('sec' + x).classList.toggle('hidden', t.toUpperCase() !== x);
    document.getElementById('tab' + x).classList.toggle('on', t.toUpperCase() === x);

// ── DOPYTY ────────────────────────────────────────────────────────────────────
function renderRequests() {
  const el = document.getElementById('reqList');
  if (!requests.length) { el.innerHTML = '<div class="empty">Žiadne dopyty. Vytvorte prvý dopyt.</div>'; return; }

  const firstRender = !el.querySelector('details[data-proj]');
  const openProjs = firstRender ? null : new Set([...el.querySelectorAll('details[data-proj][open]')].map(d => d.dataset.proj));
  const openReqs  = new Set([...el.querySelectorAll('.row-expand.on')].map(d => d.id.replace('rd-', '')));

  // Group by project
  const projMap = {};
  requests.forEach(r => {
    const key = r.project_cislo || r.project_name || r.id;
    if (!projMap[key]) projMap[key] = { cislo: r.project_cislo, name: r.project_name, reqs: [] };
    projMap[key].reqs.push(r);
  });

  // Sort projects: newest cislo first (desc), then by name
  const projects = Object.entries(projMap).sort(([a], [b]) => b.localeCompare(a, 'sk'));

  el.innerHTML = projects.map(([key, proj]) => {
    const isOpen = firstRender || openProjs.has(key);
    const sorted = [...proj.reqs].sort((a, b) => (a.profession || '').localeCompare(b.profession || '', 'sk'));

    // Sub-group by profession category (prefix before dash/space)
    const catMap = {};
    sorted.forEach(r => { const c = profCat(r.profession); if (!catMap[c]) catMap[c] = []; catMap[c].push(r); });
    const cats = Object.entries(catMap).sort(([a], [b]) => a.localeCompare(b, 'sk'));
    const showCats = cats.length > 1;

    const rows = cats.map(([cat, catReqs]) => {
      const catHdr = showCats
        ? `<div style="padding:5px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);background:var(--bg);border-bottom:1px solid var(--border)55">${cat}</div>`
        : '';
      return catHdr + catReqs.map(r => {
        const invs = invitations.filter(i => i.request_id === r.id);
        const nSub = invs.filter(i => ['submitted','selected','rejected'].includes(i.status)).length;
        return `<div>
          <div class="row-item" onclick="toggleReq('${r.id}')">
            <span class="badge b-sent">${r.profession}</span>
            <span style="flex:1"></span>
            <span style="font-size:12px;color:var(--text2);margin-right:6px">${nSub}/${invs.length}</span>
            <span class="badge ${r.status === 'active' ? 'b-active' : 'b-closed'}">${r.status === 'active' ? 'Aktívny' : 'Uzavretý'}</span>
          </div>
          <div class="row-expand${openReqs.has(r.id) ? ' on' : ''}" id="rd-${r.id}">${openReqs.has(r.id) ? buildReqDetail(r) : ''}</div>
        </div>`;
      }).join('');
    }).join('');

    return `<details data-proj="${key}"${isOpen ? ' open' : ''} style="border-bottom:1px solid var(--border)">
      <summary style="padding:10px 14px;font-size:13px;font-weight:600;background:var(--bg3);cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;user-select:none;border-bottom:1px solid var(--border)">
        <span style="flex:1">${proj.cislo ? proj.cislo + ' – ' : ''}${proj.name}</span>
        <span style="font-size:12px;font-weight:400;color:var(--text3)">${proj.reqs.length}</span>
      </summary>
      ${rows}
    </details>`;
  }).join('');
}

function profCat(p) {
  if (!p) return '—';
  const m = p.match(/^([A-Z]{2,6})\b/);
  return m ? m[1] : (p.split(/\s*[-–]\s*/)[0] || p).trim();
}

function buildReqDetail(r) {
  const invs = invitations.filter(i => i.request_id === r.id);
  const phases = Array.isArray(r.phases) ? r.phases : [];

  let tbl;
  if (!invs.length) {
    tbl = '<p style="font-size:13px;color:var(--text2);margin-bottom:12px">Zatiaľ žiadni pozvaní profesisti.</p>';
  } else {
    const phHdr = phases.map(p => `<th>${p}</th>`).join('');
    const rows = invs.map(inv => {
      const sp = specialists.find(s => s.id === inv.specialist_id);
      const q  = quotes.find(q => q.invitation_id === inv.id);
      const cells = phases.map(p => {
        const v = q?.prices?.[p];
        return `<td>${v != null ? Number(v).toLocaleString('sk-SK') + ' €' : '—'}</td>`;
      }).join('');
      const dl  = q?.deadline ? new Date(q.deadline).toLocaleDateString('sk-SK') : '—';
      const cls = inv.status === 'selected' ? 'winner' : inv.status === 'rejected' ? 'loser' : '';
      const act = inv.status === 'submitted'
        ? `<button class="btn btn-grn btn-sm" onclick="selectWinner(event,'${inv.id}','${r.id}')">Vybrať</button>
           <button class="btn btn-sm" onclick="withdrawQuote(event,'${inv.id}','${r.id}')" style="color:var(--text2);border-color:var(--border)">Stiahnuť</button>`
        : inv.status === 'selected'
          ? `<span style="font-size:12px;color:var(--green);font-weight:500">✓ Vybraný</span>
             <button class="btn btn-sm" onclick="genTeamLink(event,'${inv.specialist_id}')">📋 Tím</button>
             <button class="btn btn-sm" onclick="cancelWinner(event,'${inv.id}','${r.id}')" style="color:var(--text2);border-color:var(--border)">Zrušiť</button>`
          : '';
      const noteCell = q?.notes
        ? `<td onclick="var s=this.style;s.whiteSpace=s.whiteSpace==='normal'?'nowrap':'normal';s.maxWidth=s.maxWidth==='none'?'180px':'none'"
            style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-size:12px;color:var(--text2)"
            title="${q.notes.replace(/"/g,'&quot;')}">${q.notes}</td>`
        : '<td style="color:var(--text3);font-size:12px">—</td>';
      return `<tr class="${cls}">
        <td><strong>${sp?.name || '?'}</strong><br><span style="font-size:11px;color:var(--text3)">${sp?.company || ''}</span></td>
        ${cells}
        ${noteCell}
        <td>${dl}</td>
        <td><span class="badge b-${inv.status}">${statusLabel(inv.status)}</span></td>
        <td style="white-space:nowrap">
          ${act}
          <button class="btn btn-g btn-sm" onclick="openCenyModal('${inv.id}','${r.id}')">✎ Ceny</button>
        </td>
      </tr>`;
    }).join('');
    tbl = `<div style="overflow-x:auto"><table class="qtable"><thead><tr><th>Profesista</th>${phHdr}<th>Poznámka</th><th>Termín</th><th>Stav</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  const phBadges = phases.map(p => `<span class="badge b-sent" style="margin-right:3px">${p}</span>`).join('');
  const fmtD = d => d ? new Date(d).toLocaleDateString('sk-SK') : null;
  const dateInfo = [
    r.deadline ? 'Termín fázy: <strong>' + fmtD(r.deadline) + '</strong>' : null,
    r.podklady_datum ? 'Podklady: <strong>' + fmtD(r.podklady_datum) + '</strong>' : null,
    r.hotovo_datum ? 'Výsledok: <strong>' + fmtD(r.hotovo_datum) + '</strong>' : null
  ].filter(Boolean).join(' · ');
  const info = `<div style="margin-bottom:6px;font-size:13px">${phBadges}${r.current_phase ? ` <span style="color:var(--text2);margin-left:4px">Aktuálna:</span> <strong>${r.current_phase}</strong>` : ''}${r.folder_url ? ` &nbsp;<a href="${r.folder_url}" target="_blank" style="color:var(--blue)">Podklady nacenenie ↗</a>` : ''}${r.folder_url_work ? ` &nbsp;<a href="${r.folder_url_work}" target="_blank" style="color:var(--blue)">Podklady vypracovanie ↗</a>` : ''}</div>`;
  const dateInfoHtml = dateInfo ? ('<div style="font-size:13px;color:var(--text2);margin-bottom:10px">' + dateInfo + '</div>') : '';
  const note = r.notes ? `<p style="font-size:13px;color:var(--text2);margin-bottom:12px">${r.notes}</p>` : '';
  const taskLinkLabel = r.caflou_task_id
    ? `🔗 Úloha #${r.caflou_task_id}`
    : '🔗 Pripojiť k úlohe';
  const btns = `<div class="btn-row mt10">
    <button class="btn btn-g btn-sm" onclick="openReqModal('${r.id}')">Upraviť</button>
    <button class="btn btn-g btn-sm" onclick="openTaskLink('${r.id}','${r.project_cislo||''}')">${taskLinkLabel}</button>
    ${r.status === 'active'
      ? `<button class="btn btn-g btn-sm" onclick="closeReq(event,'${r.id}')">Uzavrieť</button>`
      : `<button class="btn btn-g btn-sm" onclick="reopenReq(event,'${r.id}')">Znovu otvoriť</button>`}
    <button class="btn btn-sm" onclick="deleteReq(event,'${r.id}')" style="color:var(--red);border-color:var(--red-bd);background:var(--red-bg)">Vymazať</button>
  </div>
  <div id="task-link-${r.id}" style="margin-top:8px"></div>`;

  const links = invs.length ? `<div class="mt16"><p style="font-size:12px;color:var(--text2);margin-bottom:8px">Linky pre profesistov (skopírovať a poslať emailom):</p>` +
    invs.map(inv => {
      const sp  = specialists.find(s => s.id === inv.specialist_id);
      const url = `${location.origin}${location.pathname.replace('ponuky.html','portal.html')}?token=${inv.token}`;
      return `<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text2);min-width:120px">${sp?.name || '?'}:</span>
        <span class="link-code" style="flex:1">${url}</span>
        <button class="btn btn-g btn-sm" onclick="copyTxt('${url}')">Kopírovať</button>
      </div>`;
    }).join('') + '</div>' : '';

  return info + dateInfoHtml + note + tbl + btns + links;
}

function openReq(id) {
  const el = document.getElementById('rd-' + id);
  if (!el) return;
  el.classList.add('on');
  if (!el.innerHTML.trim()) {
    const r = requests.find(r => r.id === id);
    if (r) el.innerHTML = buildReqDetail(r);
  }
}
function toggleReq(id) {
  const el = document.getElementById('rd-' + id);
  if (!el) return;
  const opening = el.classList.toggle('on');
  if (opening && !el.innerHTML.trim()) {
    const r = requests.find(r => r.id === id);
    if (r) el.innerHTML = buildReqDetail(r);
  }
}
function statusLabel(s) {
  return {sent:'Odoslané',viewed:'Otvorené',submitted:'Ponuka',selected:'Vybraný',rejected:'Nevybraný'}[s] || s;
}

async function genTeamLink(e, specId) {
  e.stopPropagation();
  let { data: et } = await sb.from('employee_tasks').select('token').eq('specialist_id', specId).single();
  if (!et) {
    const { data: newEt } = await sb.from('employee_tasks').insert({ specialist_id: specId }).select('token').single();
    et = newEt;
  }
  if (!et) { showToast('Chyba pri vytváraní linku', 'err'); return; }
  const base = location.origin + location.pathname.replace(/[^/]*$/, '');
  const link = base + 'portal.html?task=' + et.token;
  navigator.clipboard.writeText(link).then(() => showToast('Odkaz skopírovaný'), () => showToast(link));
}

function refreshReqDetail(reqId) {
  const el = document.getElementById('rd-' + reqId);
  if (!el) return;
  const r = requests.find(r => r.id === reqId);
  if (r) el.innerHTML = buildReqDetail(r);
  el.classList.add('on');
}

async function selectWinner(e, invId, reqId) {
  e.stopPropagation();
  const invs = invitations.filter(i => i.request_id === reqId);
  await Promise.all(invs.map(i =>
    sb.from('invitations').update({ status: i.id === invId ? 'selected' : 'rejected' }).eq('id', i.id)
  ));
  invs.forEach(i => { i.status = i.id === invId ? 'selected' : 'rejected'; });
  const req = requests.find(r => r.id === reqId);
  const inv = invitations.find(i => i.id === invId);
  const spec = specialists.find(s => s.id === inv?.specialist_id);
  if (req?.caflou_task_id && spec?.name) {
    await sb.from('task_specialists').upsert({
      task_id: req.caflou_task_id,
      task_name: req.notes || req.profession,
      project_cislo: req.project_cislo,
      specialist_name: spec.name,
      updated_at: new Date().toISOString(),
    });
  }
  if (req && req.status !== 'closed') {
    await sb.from('requests').update({ status: 'closed' }).eq('id', reqId);
    req.status = 'closed';
  }
  refreshReqDetail(reqId);
}

async function cancelWinner(e, invId, reqId) {
  e.stopPropagation();
  if (!confirm('Zrušiť výber? Všetci profesisti sa vrátia na stav Ponuka.')) return;
  const invs = invitations.filter(i => i.request_id === reqId && ['selected','rejected'].includes(i.status));
  await Promise.all(invs.map(i => sb.from('invitations').update({ status: 'submitted' }).eq('id', i.id)));
  invs.forEach(i => { i.status = 'submitted'; });
  const req = requests.find(r => r.id === reqId);

async function withdrawQuote(e, invId, reqId) {
  e.stopPropagation();
  if (!confirm('Stiahnuť ponuku? Ceny sa zmažú a stav sa vráti na Odoslané.')) return;
  const q = quotes.find(q => q.invitation_id === invId);
  if (q) { await sb.from('quotes').delete().eq('id', q.id); quotes = quotes.filter(x => x.id !== q.id); }
  await sb.from('invitations').update({ status: 'sent' }).eq('id', invId);
  const inv = invitations.find(i => i.id === invId);
  if (inv) inv.status = 'sent';
  showToast('Ponuka stiahnutá', 'ok');
  refreshReqDetail(reqId);
}

async function doInvite() {
  const msgEl = document.getElementById('mInvMsg');

    if (!sel.length) { msgEl.innerHTML = '<div class="alert alert-err">Vyberte aspoň jedného.</div>'; return; }

    const toUpsert = sel.map(cb => {
      const c = contacts.find(x => x.email === cb.dataset.email);
      return { email: c.email, name: c.name, company: c.company || '', profession: (c.labels || []).join(', '), phone: c.phone || '' };
    });
    const { data: upserted, error: upsErr } = await sb.from('specialists')
      .upsert(toUpsert, { onConflict: 'email' }).select('id, email');
    if (upsErr) { msgEl.innerHTML = `<div class="alert alert-err">${upsErr.message}</div>`; return; }

    const { error } = await sb.from('invitations').insert(
      upserted.map(u => ({ request_id: inviteReqId, specialist_id: u.id }))
    );
    if (error) { msgEl.innerHTML = `<div class="alert alert-err">${error.message}</div>`; return; }

function renderSpecialists() {
  const el = document.getElementById('specList');
  const q = (document.getElementById('specSearch')?.value || '').toLowerCase().trim();

  let profs = specialists.filter(s => s.profession && s.profession.toLowerCase() !== 'klient');
  if (q) profs = profs.filter(s =>
    (s.name || '').toLowerCase().includes(q) ||
    (s.profession || '').toLowerCase().includes(q) ||
    (s.email || '').toLowerCase().includes(q)
  );
  if (!profs.length) { el.innerHTML = `<div class="empty">${q ? 'Žiadne výsledky.' : 'Žiadni profesisti.'}</div>`; return; }

  const groups = {};
  profs.forEach(s => {
    const labels = (s.profession || '').split(',').map(l => l.trim()).filter(Boolean);
    (labels.length ? labels : ['—']).forEach(label => {
      if (!groups[label]) groups[label] = [];
      if (!groups[label].find(x => x.id === s.id)) groups[label].push(s);
    });
  });

  el.innerHTML = Object.entries(groups)
    .sort((a, b) => a[0].localeCompare(b[0], 'sk'))
    .map(([prof, specs]) => {
      const rows = specs.sort((a, b) => a.name.localeCompare(b.name, 'sk')).map(s => {
        const portalUrl = s.portal_token
          ? `${location.origin}${location.pathname.replace('ponuky.html','portal.html')}?specialist=${s.portal_token}`
          : null;
        return `<div class="row-item" style="cursor:default">
          <div style="flex:1;line-height:1.5">
            <strong>${s.name}</strong>${s.company ? ` <span style="color:var(--text2)">· ${s.company}</span>` : ''}
            <br><span style="font-size:12px;color:var(--text2)">${s.email}${s.phone ? ' · ' + s.phone : ''}</span>
          </div>
          ${portalUrl
            ? `<button class="btn btn-g btn-sm" title="${portalUrl}" onclick="copyTxt('${portalUrl}');showToast('Link skopírovaný')">🔗 Portál</button>`
            : `<button class="btn btn-g btn-sm" onclick="generatePortalToken('${s.id}')">🔗 Vytvoriť portál</button>`}
          <button class="btn btn-g btn-sm" onclick="openSpecModal('${s.id}')">Upraviť</button>
          <button class="btn btn-sm" onclick="deleteSpec('${s.id}')" style="color:var(--red);border-color:var(--red-bd);background:var(--red-bg)">×</button>
        </div>`;
      }).join('');
      return `<details style="border-bottom:1px solid var(--border)">
        <summary style="padding:9px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:space-between;list-style:none;user-select:none">
          <span>${prof}</span><span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:12px">${specs.length}</span>
        </summary>
        ${rows}
      </details>`;
    }).join('');
}

// ── NAPOJENIE DOPYTU NA ÚLOHU ─────────────────────────────────────────────────
async function openTaskLink(reqId, cislo) {
  const el = document.getElementById('task-link-' + reqId);
  if (!el) return;
  if (!cfg.caflou_key || !cfg.caflou_id) {
    el.innerHTML = '<span style="font-size:12px;color:var(--red)">Caflou API kľúč nie je nastavený v nastaveniach.</span>';
    return;
  }
  el.innerHTML = '<span style="font-size:12px;color:var(--text3)">Načítavam úlohy...</span>';
  try {
    await loadCaflouProjects();
    const proj = caflouProjects.find(p => p.order_number === cislo);
    if (!proj) { el.innerHTML = '<span style="font-size:12px;color:var(--red)">Projekt ' + cislo + ' nenájdený v Caflou.</span>'; return; }
    const taskIdSet = new Set((proj.task_ids || []).map(Number));
    let tasks = [], page = 1, tp = 1;
    while (page <= tp) {
      const r = await fetch(
        `https://app.caflou.com/api/v1/${cfg.caflou_id}/tasks?project_id=${proj.id}&per=100&page=${page}`,
        { headers: { Authorization: `Bearer ${cfg.caflou_key}` } }
      );
      const d = await r.json();
      const batch = (d.results || []).filter(t => taskIdSet.size === 0 || taskIdSet.has(Number(t.id)));
      tasks = tasks.concat(batch);
      if (taskIdSet.size > 0 && tasks.length >= taskIdSet.size) break;
      tp = d.total_pages || 1; page++;
    }
    const active = tasks.filter(t => !t.finished);
    if (!active.length) { el.innerHTML = '<span style="font-size:12px;color:var(--text3)">Projekt nemá žiadne aktívne úlohy.</span>'; return; }
    const req = requests.find(r => r.id === reqId);
    const curTaskId = req?.caflou_task_id;
    // ext úlohy prvé, ostatné za nimi
    active.sort((a,b) => {
      const ae = (a.tags||[]).includes('ext'), be = (b.tags||[]).includes('ext');
      return ae === be ? 0 : ae ? -1 : 1;
    });
    const opts = active.map(t => {
      const ext = (t.tags||[]).includes('ext') ? ' [ext]' : '';
      return `<option value="${t.id}"${t.id == curTaskId ? ' selected' : ''}>${t.name}${ext}</option>`;
    }).join('');
    el.innerHTML = `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <select id="tsel-${reqId}" class="finput" style="flex:1;font-size:12px;min-width:180px">
        <option value="">— bez prepojenia —</option>${opts}
      </select>
      <button class="btn btn-p btn-sm" onclick="saveTaskLink('${reqId}')">Uložiť</button>
      <button class="btn btn-g btn-sm" onclick="document.getElementById('task-link-${reqId}').innerHTML=''">Zrušiť</button>
    </div>`;
  } catch(e) {
    el.innerHTML = `<span style="font-size:12px;color:var(--red)">Chyba: ${e.message}</span>`;
  }
}

  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.className = 'toast toast-' + (type || 'ok');
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>
