<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cenová ponuka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f5f3ef; --bg2:#fff; --bg3:#f0ede8;
      --border:#e4dfd8;
      --text:#2c2825; --text2:#6b6460; --text3:#9e9590;
      --green:#1e7a4a; --grn-bg:#f0faf5; --grn-bd:#b8e6cc;
      --blue:#1a5fa0; --blu-bg:#f0f6fd; --blu-bd:#b8d4f0;
      --red:#c0392b; --red-bg:#fdf2f1; --red-bd:#f5c6c2;
      --sans:'DM Sans',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh}

    .top{background:var(--text);color:#f5f3ef;padding:12px 18px;display:flex;align-items:center;gap:8px}
    .top-logo{font-size:16px;font-weight:600}
    .top-sub{font-size:13px;color:rgba(245,243,239,.45)}

    .wrap{max-width:600px;margin:0 auto;padding:20px 16px}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px}
    .card h2{font-size:18px;font-weight:600;margin-bottom:4px}
    .card .sub{font-size:14px;color:var(--text2);margin-bottom:14px}

    .meta{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:14px}
    .meta-item label{font-size:11px;color:var(--text3);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
    .meta-item span{font-size:14px;font-weight:500}
    .badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:12px;font-weight:500;background:var(--blu-bg);color:var(--blue);border:1px solid var(--blu-bd)}

    .link-btn{display:inline-flex;align-items:center;gap:6px;color:var(--blue);font-size:14px;font-weight:500;text-decoration:none;padding:7px 12px;border:1px solid var(--blu-bd);border-radius:7px;background:var(--blu-bg)}
    .link-btn:hover{background:#dceefb}

    .divider{height:1px;background:var(--border);margin:16px 0}
    .note{font-size:14px;color:var(--text2);line-height:1.5}

    .price-table{width:100%;border-collapse:collapse;margin-bottom:8px}
    .price-table th{text-align:left;font-size:12px;color:var(--text2);font-weight:500;padding:6px 0;border-bottom:2px solid var(--border)}
    .price-table td{padding:9px 0;border-bottom:1px solid var(--border);vertical-align:middle}
    .price-table tr:last-child td{border-bottom:none}
    .phase-name{font-size:14px;font-weight:500}
    .price-inp-wrap{display:flex;align-items:center;gap:6px;justify-content:flex-end}
    .price-inp-wrap input{width:120px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:14px;font-family:var(--sans);text-align:right;background:var(--bg3);outline:none;-moz-appearance:textfield}
    .price-inp-wrap input::-webkit-outer-spin-button,.price-inp-wrap input::-webkit-inner-spin-button{-webkit-appearance:none}
    .price-inp-wrap input:focus{border-color:var(--blue);background:var(--bg2)}
    .price-inp-wrap span{font-size:13px;color:var(--text2);white-space:nowrap}

    .frow{margin-bottom:14px}
    .frow label{display:block;font-size:13px;color:var(--text2);font-weight:500;margin-bottom:6px}
    .finput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:14px;font-family:var(--sans);color:var(--text);outline:none}
    .finput:focus{border-color:var(--blue);background:var(--bg2)}
    textarea.finput{resize:vertical;min-height:80px}
    .hint{font-size:12px;color:var(--text3);margin-top:5px}

    .submit-btn{width:100%;padding:13px;border-radius:8px;border:none;background:var(--text);color:#f5f3ef;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer}
    .submit-btn:hover{background:#1a1614}
    .submit-btn:disabled{opacity:.4;cursor:not-allowed}

    .alert{padding:12px 14px;border-radius:8px;font-size:14px;margin-bottom:14px}
    .alert-ok{background:var(--grn-bg);color:var(--green);border:1px solid var(--grn-bd)}
    .alert-err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
    .alert-info{background:var(--blu-bg);color:var(--blue);border:1px solid var(--blu-bd)}

    .status-wrap{text-align:center;padding:48px 20px}
    .status-icon{font-size:52px;margin-bottom:14px}
    .status-wrap h2{margin-bottom:8px;font-size:20px}
    .status-wrap p{color:var(--text2);line-height:1.5}

    .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .filter-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer}
    .filter-btn.on{background:var(--text);color:#f5f3ef;border-color:transparent}
    .req-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
    .req-card-hdr{padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;cursor:pointer;user-select:none}
    .req-card-hdr:hover{background:var(--bg3)}
    .req-card-body{padding:14px 18px 18px;border-top:1px solid var(--border)}
    .sent-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:500;background:var(--grn-bg);color:var(--green);border:1px solid var(--grn-bd)}
  </style>
</head>
<body>

<div class="top">
  <span class="top-logo">Tornyos Architects</span>
  <span class="top-sub">· Cenová ponuka</span>
</div>

<div class="wrap" id="app">
  <div class="card">
    <div style="text-align:center;padding:32px;color:var(--text2)">Načítavam...</div>
  </div>
</div>

<script>
const SB_URL = 'https://cfjkomqxzqflotrqxfyl.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmamtvbXF4enFmbG90cnF4ZnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTM1NjksImV4cCI6MjA5MzUyOTU2OX0.GUnw0I0wDrkIwaJ15TnpF_8zghW_8yIM_MZlyLF1dH8';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const token = new URLSearchParams(location.search).get('token');
const specialistToken = new URLSearchParams(location.search).get('specialist');
let _specCtx = null, _profFilter = 'own', _quoteOpen = null, _resultOpen = null;

async function init() {
  if (specialistToken) { await initSpecialistView(); return; }
  if (!token) { renderError('Neplatný link – chýba token.'); return; }

  const { data: inv } = await sb.from('invitations').select('*').eq('token', token).single();
  if (!inv) { renderError('Tento link nie je platný.'); return; }

  const [{ data: req }, { data: spec }, { data: quote }] = await Promise.all([
    sb.from('requests').select('*').eq('id', inv.request_id).single(),
    sb.from('specialists').select('*').eq('id', inv.specialist_id).single(),
    sb.from('quotes').select('*').eq('invitation_id', inv.id).single(),
  ]);

  if (!req) { renderError('Dopyt nebol nájdený.'); return; }

  if (inv.status === 'sent') {
    await sb.from('invitations').update({ status: 'viewed' }).eq('id', inv.id);
  }

  if (inv.status === 'selected') { renderStatus('selected', req, spec, quote); return; }
  if (inv.status === 'rejected') { renderStatus('rejected', req, spec, quote); return; }

  renderForm(inv, req, spec, quote);
}

function renderError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="status-wrap">
        <div class="status-icon">⚠️</div>
        <h2>Chyba</h2>
        <p>${msg}</p>
      </div>
    </div>`;
}

function renderStatus(status, req, spec, quote) {
  const sel = status === 'selected';
  const proj = `${req.project_cislo ? req.project_cislo + ' ' : ''}${req.project_name}`;
  const phases = Array.isArray(req.phases) ? req.phases : [];

  const priceRows = quote && phases.length ? phases.map(ph => {
    const v = quote.prices?.[ph];
    return `<tr>
      <td class="phase-name">${ph}</td>
      <td style="text-align:right;font-weight:500">${v != null ? Number(v).toLocaleString('sk-SK') + ' € bez DPH' : '—'}</td>
    </tr>`;
  }).join('') : '';

  const reqBlock = (req.folder_url || req.folder_url_work || req.notes) ? `
    <div class="divider"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:${req.notes ? '10px' : '0'}">
      ${req.folder_url ? `<a href="${req.folder_url}" target="_blank" class="link-btn">📁 Podklady na nacenenie</a>` : ''}
      ${req.folder_url_work ? `<a href="${req.folder_url_work}" target="_blank" class="link-btn">📂 Podklady na vypracovanie</a>` : ''}
    </div>
    ${req.notes ? `<p class="note">${req.notes}</p>` : ''}` : '';

  const quoteBlock = quote ? `
    <div class="divider"></div>
    <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Vaša odoslaná ponuka</h3>
    ${priceRows ? `<table class="price-table"><thead><tr><th>Fáza</th><th style="text-align:right">Cena</th></tr></thead><tbody>${priceRows}</tbody></table>` : ''}
    ${quote.notes ? `<p style="font-size:13px;color:var(--text2);margin-top:6px">Poznámka: ${quote.notes}</p>` : ''}` : '';

  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="status-wrap">
        <div class="status-icon">${sel ? '✅' : 'ℹ️'}</div>
        <h2>${sel ? 'Boli ste vybraný' : 'Ďakujeme za ponuku'}</h2>
        <p>${sel
          ? `Gratulujeme${spec?.name ? ', ' + spec.name : ''}! Pre projekt <strong>${proj}</strong> ste boli vybraný ako dodávateľ.`
          : `Pre projekt <strong>${proj}</strong> bol vybraný iný dodávateľ. Ďakujeme za Vašu ponuku a budeme radi ak sa ozvete pri ďalšom projekte.`
        }</p>
      </div>
      ${reqBlock}
      ${quoteBlock}
    </div>`;
}

let _submitCtx = null;

function renderForm(inv, req, spec, existingQuote) {
  const phases = Array.isArray(req.phases) ? req.phases : [];
  const hasQuote = !!existingQuote;

  // Termíny: PD klientovi = req.deadline, externý = existingQuote.deadline ?? req.deadline - 7 dní
  const projDeadline = req.deadline ? new Date(req.deadline + 'T12:00:00') : null;
  const autoSpecDl = projDeadline
    ? new Date(projDeadline.getTime() - 7 * 24 * 3600000).toISOString().split('T')[0]
    : '';
  const specDlValue = existingQuote?.deadline || autoSpecDl;
  const fmtD = d => d.toLocaleDateString('sk-SK');

  _submitCtx = { invId: inv.id, phases, curPhase: req.current_phase || '' };

  const priceRows = phases.map(ph => {
    const safeId = 'p_' + ph.replace(/[^a-z0-9]/gi, '_');
    const val = existingQuote?.prices?.[ph];
    return `<tr>
      <td class="phase-name">${ph}</td>
      <td>
        <div class="price-inp-wrap">
          <input type="number" id="${safeId}" min="0" step="100" placeholder="0" value="${val != null ? val : ''}">
          <span>€ bez DPH</span>
        </div>
      </td>
    </tr>`;
  }).join('');


  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>${req.project_cislo ? req.project_cislo + ' – ' : ''}${req.project_name}</h2>
      <div class="sub">${req.profession}</div>
      <div class="meta">
        ${spec ? `<div class="meta-item"><label>Pre</label><span>${spec.name}</span></div>` : ''}
        ${req.current_phase ? `<div class="meta-item"><label>Aktuálna fáza</label><span class="badge">${req.current_phase}</span></div>` : ''}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        ${req.folder_url ? `<a href="${req.folder_url}" target="_blank" class="link-btn">📁 Podklady na nacenenie</a>` : ''}
        ${req.folder_url_work ? `<a href="${req.folder_url_work}" target="_blank" class="link-btn">📂 Podklady na vypracovanie</a>` : ''}
      </div>
      ${req.notes ? `<div class="divider"></div><p class="note">${req.notes}</p>` : ''}
    </div>

    <div class="card">
      <h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Vaša cenová ponuka</h3>

      ${hasQuote ? '<div class="alert alert-info">Ponuka bola odoslaná. Môžete ju upraviť a znova odoslať.</div>' : ''}
      <div id="formMsg"></div>

      <table class="price-table">
        <thead><tr><th>Fáza</th><th style="text-align:right">Cena</th></tr></thead>
        <tbody>${priceRows}</tbody>
      </table>
      <p class="hint" style="margin-bottom:16px">Ak fázu neponúkate, nechajte pole prázdne.</p>

      ${projDeadline ? `
      <div class="frow">
        <label>Termín odovzdania PD klientovi</label>
        <div class="finput" style="background:var(--bg2);color:var(--text2);cursor:default">${fmtD(projDeadline)}</div>
      </div>` : ''}
      <div class="frow">
        <label>Váš termín odovzdania${projDeadline ? ' <span style="font-size:11px;color:var(--text3);font-weight:400">(týždeň pred odovzdaním)</span>' : ''}</label>
        <input class="finput" type="date" id="specDeadline" value="${specDlValue}">
      </div>

      <div class="frow">
        <label>Poznámka (voliteľné)</label>
        <textarea class="finput" id="notes" placeholder="Podmienky, výhrady, otázky, referencie...">${existingQuote?.notes || ''}</textarea>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitQuote()">
        ${hasQuote ? 'Aktualizovať ponuku' : 'Odoslať ponuku'}
      </button>
    </div>`;
}

async function submitQuote() {
  const { invId, phases, curPhase } = _submitCtx;
  const btn   = document.getElementById('submitBtn');
  const msgEl = document.getElementById('formMsg');
  btn.disabled = true; btn.textContent = 'Odosielam...';

  const prices = {};
  phases.forEach(ph => {
    const safeId = 'p_' + ph.replace(/[^a-z0-9]/gi, '_');
    const v = document.getElementById(safeId)?.value;
    prices[ph] = v !== '' && v != null ? parseFloat(v) : null;
  });

  const notes    = document.getElementById('notes')?.value.trim() || '';
  const deadline = document.getElementById('specDeadline')?.value || null;

  const { data: existing } = await sb.from('quotes').select('id').eq('invitation_id', invId).single();

  const payload = { prices, notes, deadline, submitted_at: new Date().toISOString() };
  const { error } = existing
    ? await sb.from('quotes').update(payload).eq('invitation_id', invId)
    : await sb.from('quotes').insert({ ...payload, invitation_id: invId });

  if (error) {
    msgEl.innerHTML = `<div class="alert alert-err">Chyba: ${error.message}</div>`;
    btn.disabled = false; btn.textContent = 'Odoslať ponuku';
    return;
  }

  await sb.from('invitations').update({ status: 'submitted' }).eq('id', invId);
  msgEl.innerHTML = '<div class="alert alert-ok">Ponuka bola úspešne odoslaná. Ďakujeme!</div>';
  btn.textContent = 'Aktualizovať ponuku';
  btn.disabled = false;
}

// ── SPECIALIST MARKETPLACE MODE ───────────────────────────────────────────────
async function initSpecialistView() {
  document.querySelector('.top-sub').textContent = '· Portál profesistov';
  const { data: spec } = await sb.from('specialists').select('*').eq('portal_token', specialistToken).single();
  if (!spec) { renderError('Neplatný link – profesista nenájdený.'); return; }
  document.title = 'Portál – ' + spec.name;

  const [{ data: reqs }, { data: invs }] = await Promise.all([
    sb.from('requests').select('*').eq('status', 'active').order('created_at', { ascending: false }),
    sb.from('invitations').select('*').eq('specialist_id', spec.id),
  ]);
  const invIds = (invs || []).map(i => i.id);
  const { data: qts } = invIds.length
    ? await sb.from('quotes').select('*').in('invitation_id', invIds)
    : { data: [] };

  // Fetch requests for selected/rejected invitations (may be closed → not in reqs)
  const srReqIds = (invs || []).filter(i => ['selected','rejected'].includes(i.status)).map(i => i.request_id);
  const missingIds = srReqIds.filter(id => !(reqs || []).find(r => r.id === id));
  const { data: srReqs } = missingIds.length
    ? await sb.from('requests').select('id,project_cislo,project_name,profession,phases,notes,folder_url,folder_url_work,podklady_datum,hotovo_datum').in('id', missingIds)
    : { data: [] };

  _specCtx = { spec, reqs: reqs || [], srReqs: srReqs || [], invs: invs || [], qts: qts || [] };
  renderSpecialistView();
}

function renderSpecialistView() {
  const { spec, reqs, srReqs, invs, qts } = _specCtx;
  const myProfs = (spec.profession || '').split(',').map(p => p.trim().toLowerCase()).filter(Boolean);

  // Requests where I'm already selected or rejected — show separately
  const decidedReqIds = new Set(invs.filter(i => ['selected','rejected'].includes(i.status)).map(i => i.request_id));
  const openReqs = reqs.filter(r => !decidedReqIds.has(r.id));

  const filtered = _profFilter === 'own' && myProfs.length
    ? openReqs.filter(r => myProfs.some(p => (r.profession || '').toLowerCase().includes(p) || p.includes((r.profession || '').toLowerCase())))
    : openReqs;

  // Build results section (selected/rejected)
  const allDecidedReqs = [...reqs.filter(r => decidedReqIds.has(r.id)), ...(srReqs || [])];
  const resultsHtml = allDecidedReqs.some(r => { const inv = invs.find(i => i.request_id === r.id); return inv?.status === 'selected' || qts.some(q => q.invitation_id === inv?.id); }) ? `
    <div style="margin-bottom:18px">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px">Výsledky dopytov</div>
      ${allDecidedReqs.map(r => {
        const inv = invs.find(i => i.request_id === r.id);
        const sel = inv?.status === 'selected';
        const qt = qts.find(q => q.invitation_id === inv?.id);
        if (!sel && !qt) return '';
        const isOpen = _resultOpen === r.id;
        const phases = Array.isArray(r.phases) ? r.phases : [];
        const priceRows = qt && phases.length ? phases.map(ph => {
          const v = qt.prices?.[ph];
          return `<tr><td class="phase-name">${ph}</td><td style="text-align:right;font-weight:500">${v != null ? Number(v).toLocaleString('sk-SK') + ' € bez DPH' : '—'}</td></tr>`;
        }).join('') : '';
        return `<div class="req-card" style="border-left:3px solid ${sel ? '#1e7a4a' : '#c8bfb5'}">
          <div class="req-card-hdr" onclick="toggleResultCard('${r.id}')">
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:600;margin-bottom:2px">${r.project_cislo ? r.project_cislo + ' – ' : ''}${r.project_name}</div>
              <div style="font-size:12px;color:var(--text2)">${r.profession}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
              <span style="font-size:13px;font-weight:600;color:${sel ? '#1e7a4a' : 'var(--text3)'}">
                ${sel ? '✅ Boli ste vybraný' : 'ℹ️ Vybraný bol iný projektant'}
              </span>
              <span style="font-size:16px;color:var(--text3)">${isOpen ? '▲' : '▼'}</span>
            </div>
          </div>
          <div style="display:${isOpen ? 'block' : 'none'}">
            <div class="req-card-body">
              ${sel ? (() => {
                const fmtD = d => new Date(d + 'T12:00:00').toLocaleDateString('sk-SK');
                const infoItems = [
                  r.folder_url_work ? `<a href="${r.folder_url_work}" target="_blank" class="link-btn">📂 Podklady na vypracovanie</a>` : null,
                  r.podklady_datum  ? `<span style="font-size:13px;color:var(--text2)">Podklady dostanete: <strong>${fmtD(r.podklady_datum)}</strong></span>` : null,
                  r.hotovo_datum    ? `<span style="font-size:13px;color:var(--text2)">Váš diel hotový do: <strong>${fmtD(r.hotovo_datum)}</strong></span>` : null,
                ].filter(Boolean);
                return `${infoItems.length ? `<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px">${infoItems.join('')}</div>` : ''}${r.notes ? `<p class="note" style="margin-bottom:14px">${r.notes}</p>` : ''}`;
              })() : ''}
              ${qt && priceRows ? `<h3 style="font-size:14px;font-weight:600;margin-bottom:10px">Vaša odoslaná ponuka</h3>
                <table class="price-table"><thead><tr><th>Fáza</th><th style="text-align:right">Cena</th></tr></thead><tbody>${priceRows}</tbody></table>` : ''}
              ${qt?.notes ? `<p style="font-size:13px;color:var(--text2);margin-top:8px">Poznámka: ${qt.notes}</p>` : ''}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>` : '';

  const cards = filtered.length
    ? filtered.map(r => renderReqCard(r)).join('')
    : `<div style="text-align:center;padding:40px 20px;color:var(--text2);font-size:14px">Žiadne otvorené dopyty pre Vašu profesiu.</div>`;

  document.getElementById('app').innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <h2>${spec.name}</h2>
      ${spec.profession ? `<div class="sub">${spec.profession}</div>` : ''}
    </div>
    ${resultsHtml}
    <div class="filter-bar">
      <button class="filter-btn${_profFilter==='own'?' on':''}" onclick="setSpecFilter('own')">Moja profesia</button>
      <button class="filter-btn${_profFilter==='all'?' on':''}" onclick="setSpecFilter('all')">Všetky dopyty</button>
      <span style="font-size:12px;color:var(--text3);margin-left:auto">${filtered.length} dopytov</span>
    </div>
    ${cards}`;
}

function renderReqCard(r) {
  const { invs, qts } = _specCtx;
  const inv = invs.find(i => i.request_id === r.id);
  const qt = inv ? qts.find(q => q.invitation_id === inv.id) : null;
  const hasQuote = !!qt;
  const isOpen = _quoteOpen === r.id;
  const phases = Array.isArray(r.phases) ? r.phases : [];
  const deadline = r.deadline ? new Date(r.deadline + 'T12:00:00').toLocaleDateString('sk-SK') : null;
  const safeId = s => 'sp_' + r.id.replace(/-/g,'') + '_' + s.replace(/[^a-z0-9]/gi,'_');

  const phBadges = phases.map(p => `<span class="badge">${p}</span>`).join(' ');
  const priceRows = phases.map(ph => `<tr>
    <td class="phase-name">${ph}</td>
    <td><div class="price-inp-wrap">
      <input type="number" id="${safeId(ph)}" min="0" step="100" placeholder="0" value="${qt?.prices?.[ph] ?? ''}">
      <span>€ bez DPH</span>
    </div></td>
  </tr>`).join('');

  const projDl = r.deadline ? new Date(r.deadline + 'T12:00:00') : null;
  const autoSpecDl = projDl ? new Date(projDl.getTime() - 7*24*3600000).toISOString().split('T')[0] : '';
  const specDlVal = qt?.deadline || autoSpecDl;

  return `<div class="req-card">
    <div class="req-card-hdr" onclick="toggleReqCard('${r.id}')">
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:600;margin-bottom:3px">${r.project_cislo ? r.project_cislo + ' – ' : ''}${r.project_name}</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${r.profession}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">${phBadges}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        ${deadline ? `<span style="font-size:12px;font-weight:600;color:var(--orange)">⏱ ${deadline}</span>` : ''}
        ${hasQuote ? '<span class="sent-badge">✓ Ponuka odoslaná</span>' : ''}
        <span style="font-size:16px;color:var(--text3)">${isOpen ? '▲' : '▼'}</span>
      </div>
    </div>
    <div style="display:${isOpen ? 'block' : 'none'}">
      <div class="req-card-body">
        ${r.folder_url || r.folder_url_work ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          ${r.folder_url ? `<a href="${r.folder_url}" target="_blank" class="link-btn">📁 Podklady na nacenenie</a>` : ''}
          ${r.folder_url_work ? `<a href="${r.folder_url_work}" target="_blank" class="link-btn">📂 Podklady na vypracovanie</a>` : ''}
        </div>` : ''}
        ${r.notes ? `<p class="note" style="margin-bottom:14px">${r.notes}</p>` : ''}
        ${hasQuote ? '<div class="alert alert-info" style="margin-bottom:14px">Ponuka bola odoslaná. Môžete ju upraviť a znova odoslať.</div>' : ''}
        <div id="squotemsg_${r.id}"></div>
        <table class="price-table">
          <thead><tr><th>Fáza</th><th style="text-align:right">Cena</th></tr></thead>
          <tbody>${priceRows}</tbody>
        </table>
        <p class="hint" style="margin-bottom:14px">Ak fázu neponúkate, nechajte pole prázdne.</p>
        ${projDl ? `<div class="frow"><label>Termín odovzdania PD klientovi</label>
          <div class="finput" style="background:var(--bg2);color:var(--text2);cursor:default">${projDl.toLocaleDateString('sk-SK')}</div></div>` : ''}
        <div class="frow">
          <label>Váš termín odovzdania${projDl ? ' <span style="font-size:11px;color:var(--text3);font-weight:400">(týždeň pred odovzdaním)</span>' : ''}</label>
          <input class="finput" type="date" id="sdl_${r.id}" value="${specDlVal}">
        </div>
        <div class="frow">
          <label>Poznámka (voliteľné)</label>
          <textarea class="finput" id="snotes_${r.id}" rows="2" placeholder="Podmienky, výhrady, otázky...">${qt?.notes || ''}</textarea>
        </div>
        <button class="submit-btn" onclick="submitSpecQuote('${r.id}')">${hasQuote ? 'Aktualizovať ponuku' : 'Odoslať ponuku'}</button>
      </div>
    </div>
  </div>`;
}

function toggleResultCard(reqId) { _resultOpen = _resultOpen === reqId ? null : reqId; renderSpecialistView(); }
function setSpecFilter(f) { _profFilter = f; _quoteOpen = null; renderSpecialistView(); }

function toggleReqCard(reqId) {
  _quoteOpen = _quoteOpen === reqId ? null : reqId;
  renderSpecialistView();
}

async function submitSpecQuote(reqId) {
  const { spec, reqs, invs, qts } = _specCtx;
  const req = reqs.find(r => r.id === reqId);
  const phases = Array.isArray(req?.phases) ? req.phases : [];
  const safeId = s => 'sp_' + reqId.replace(/-/g,'') + '_' + s.replace(/[^a-z0-9]/gi,'_');
  const msgEl = document.getElementById('squotemsg_' + reqId);

  const prices = {};
  phases.forEach(ph => {
    const v = document.getElementById(safeId(ph))?.value;
    prices[ph] = v !== '' && v != null ? parseFloat(v) : null;
  });
  const notes    = document.getElementById('snotes_' + reqId)?.value.trim() || '';
  const deadline = document.getElementById('sdl_' + reqId)?.value || null;

  let inv = invs.find(i => i.request_id === reqId);
  if (!inv) {
    const { data: newInv, error: invErr } = await sb.from('invitations')
      .insert({ request_id: reqId, specialist_id: spec.id, status: 'submitted' })
      .select().single();
    if (invErr) { if (msgEl) msgEl.innerHTML = `<div class="alert alert-err">Chyba: ${invErr.message}</div>`; return; }
    inv = newInv;
    _specCtx.invs.push(inv);
  }

  const existing = qts.find(q => q.invitation_id === inv.id);
  const payload = { prices, notes, deadline, submitted_at: new Date().toISOString() };
  const { error } = existing
    ? await sb.from('quotes').update(payload).eq('id', existing.id)
    : await sb.from('quotes').insert({ ...payload, invitation_id: inv.id });
  if (error) { if (msgEl) msgEl.innerHTML = `<div class="alert alert-err">Chyba: ${error.message}</div>`; return; }

  await sb.from('invitations').update({ status: 'submitted' }).eq('id', inv.id);
  inv.status = 'submitted';
  if (existing) { Object.assign(existing, payload); }
  else { _specCtx.qts.push({ ...payload, invitation_id: inv.id, id: 'tmp' }); }

  _quoteOpen = null;
  renderSpecialistView();
}

init();
</script>
</body>
</html>
